data_dir: data

server:
  port: 8080
  mode: debug
  trusted_proxies:
    - 127.0.0.1
    - ::1

database:
  driver: sqlite
  path: bilibili-up-admin.db

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

bilibili:
  sess_data: "your_sess_data_here"
  bili_jct: "your_bili_jct_here"
  user_id: 0

llm:
  provider: "openai"
  api_key: "your_api_key_here"
  base_url: ""
  model: "gpt-4o-mini"
  max_tokens: 1000
  temperature: 0.7

llm_providers:
  openai:
    api_key: "sk-xxx"
    model: "gpt-4o-mini"
  claude:
    api_key: "sk-ant-xxx"
    model: "claude-3-5-sonnet-latest"
  gemini:
    api_key: "AIza..."
    model: "gemini-2.5-flash"
  deepseek:
    api_key: "sk-xxx"
    model: "deepseek-chat"
  qwen:
    api_key: "sk-xxx"
    model: "qwen-plus"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  moonshot:
    api_key: "sk-xxx"
    model: "moonshot-v1-8k"
  zhipu:
    api_key: "xxx.xxx"
    model: "glm-4-flash"
  ollama:
    api_key: ""
    base_url: "http://localhost:11434"
    model: "llama3.1"

task:
  worker_count: 5
  queue_size: 100

log:
  level: debug
  format: console
  file_path: logs/bilibili-up-admin.log
