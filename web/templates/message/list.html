{{ define "head" }}
<style>
.message-item {
    transition: all 0.2s ease;
}
.message-item:hover {
    background-color: #f9fafb;
}
</style>
{{ end }}

{{ define "content" }}
<div class="mb-8">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">私信管理</h2>
            <p class="text-gray-500 mt-1">管理和回复粉丝私信</p>
        </div>
        <div class="flex space-x-3">
            <button onclick="syncMessages()" class="flex items-center space-x-2 px-4 py-2 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition">
                <i class="ri-refresh-line"></i>
                <span>同步私信</span>
            </button>
        </div>
    </div>
</div>

<!-- 筛选器 -->
<div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
    <div class="flex flex-wrap gap-4">
        <div class="w-48">
            <label class="block text-sm text-gray-500 mb-2">回复状态</label>
            <select id="filter-status" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500">
                <option value="-1">全部</option>
                <option value="0">未回复</option>
                <option value="1">已回复</option>
                <option value="2">已忽略</option>
            </select>
        </div>
        <div class="flex items-end">
            <button onclick="loadMessages()" class="px-6 py-2 bg-gray-800 text-white rounded-xl hover:bg-gray-900 transition">
                搜索
            </button>
        </div>
    </div>
</div>

<!-- 私信列表 -->
<div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div class="p-6 border-b border-gray-100">
        <div class="flex items-center justify-between">
            <h3 class="font-semibold text-gray-800">私信列表</h3>
            <span id="total-count" class="text-sm text-gray-500">共 0 条私信</span>
        </div>
    </div>
    
    <div id="message-list" class="divide-y divide-gray-100">
        <div class="p-8 text-center text-gray-400">
            <i class="ri-mail-open-line text-4xl"></i>
            <p class="mt-2">暂无私信数据</p>
        </div>
    </div>
    
    <div class="p-4 border-t border-gray-100 flex justify-center">
        <div id="pagination" class="flex space-x-2"></div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
let currentPage = 1;
const pageSize = 20;

async function loadMessages() {
    const status = document.getElementById('filter-status').value;
    
    try {
        const response = await fetch(`/api/messages?reply_status=${status}&page=${currentPage}&page_size=${pageSize}`);
        const data = await response.json();
        
        renderMessages(data.messages || []);
        document.getElementById('total-count').textContent = `共 ${data.total || 0} 条私信`;
    } catch (error) {
        showToast('加载失败: ' + error.message, 'error');
    }
}

function renderMessages(messages) {
    const container = document.getElementById('message-list');
    
    if (messages.length === 0) {
        container.innerHTML = `
            <div class="p-8 text-center text-gray-400">
                <i class="ri-mail-open-line text-4xl"></i>
                <p class="mt-2">暂无私信数据</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = messages.map(m => `
        <div class="message-item p-6">
            <div class="flex items-start space-x-4">
                <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center flex-shrink-0">
                    <i class="ri-user-line text-pink-600"></i>
                </div>
                <div class="flex-1">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <span class="font-medium text-gray-800">${m.sender_name || '用户'}</span>
                            <span class="text-xs px-2 py-1 rounded-full ${
                                m.reply_status === 1 ? 'bg-green-100 text-green-600' : 
                                m.reply_status === 2 ? 'bg-gray-100 text-gray-500' : 'bg-pink-100 text-pink-600'
                            }">
                                ${m.reply_status === 1 ? '已回复' : m.reply_status === 2 ? '已忽略' : '待回复'}
                            </span>
                            ${m.is_ai_reply ? '<span class="text-xs px-2 py-1 rounded-full bg-purple-100 text-purple-600">AI回复</span>' : ''}
                        </div>
                        <span class="text-xs text-gray-400">${formatTime(m.message_time)}</span>
                    </div>
                    <p class="text-gray-600 mt-2">${m.content}</p>
                    ${m.reply_content ? `
                        <div class="mt-3 p-3 bg-gray-50 rounded-lg">
                            <p class="text-sm text-gray-500">回复: ${m.reply_content}</p>
                        </div>
                    ` : ''}
                    <div class="flex items-center space-x-4 mt-4">
                        ${m.reply_status === 0 ? `
                            <button onclick="aiReply(${m.message_id})" class="text-pink-500 hover:text-pink-600 text-sm flex items-center space-x-1">
                                <i class="ri-robot-line"></i>
                                <span>AI回复</span>
                            </button>
                            <button onclick="manualReply(${m.message_id}, ${m.sender_id})" class="text-gray-500 hover:text-gray-600 text-sm flex items-center space-x-1">
                                <i class="ri-edit-line"></i>
                                <span>手动回复</span>
                            </button>
                            <button onclick="ignore(${m.message_id})" class="text-gray-400 hover:text-gray-500 text-sm flex items-center space-x-1">
                                <i class="ri-close-line"></i>
                                <span>忽略</span>
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

async function syncMessages() {
    showToast('正在同步私信...', 'info');
    try {
        const response = await fetch('/api/messages/sync', { method: 'POST' });
        const data = await response.json();
        showToast(`同步完成，新增 ${data.count} 条私信`, 'success');
        loadMessages();
    } catch (error) {
        showToast('同步失败: ' + error.message, 'error');
    }
}

async function aiReply(messageId) {
    showToast('正在生成AI回复...', 'info');
    try {
        const response = await fetch(`/api/messages/${messageId}/ai-reply`, { method: 'POST' });
        const data = await response.json();
        showToast('回复成功', 'success');
        loadMessages();
    } catch (error) {
        showToast('回复失败: ' + error.message, 'error');
    }
}

function manualReply(messageId, senderId) {
    const content = prompt('请输入回复内容:');
    if (!content) return;
    
    fetch(`/api/messages/${messageId}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender_id: senderId, content })
    }).then(() => {
        showToast('回复成功', 'success');
        loadMessages();
    }).catch(err => {
        showToast('回复失败: ' + err.message, 'error');
    });
}

async function ignore(messageId) {
    if (!confirm('确定忽略此私信?')) return;
    
    try {
        await fetch(`/api/messages/${messageId}/ignore`, { method: 'POST' });
        showToast('已忽略', 'success');
        loadMessages();
    } catch (error) {
        showToast('操作失败: ' + error.message, 'error');
    }
}

function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    return date.toLocaleString('zh-CN');
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${
        type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
    }`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

loadMessages();
</script>
{{ end }}
