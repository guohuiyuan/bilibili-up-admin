{{ define "head" }}
<style>
:root {
    --msg-pink: #fb7299;
    --msg-panel: #ffffff;
    --msg-line: #edf1f5;
}

.message-shell {
    background:
        radial-gradient(circle at top left, rgba(120, 190, 255, 0.1), transparent 28%),
        radial-gradient(circle at bottom right, rgba(251, 114, 153, 0.08), transparent 24%),
        linear-gradient(180deg, #f8fafc 0%, #f3f6fa 100%);
}

.message-panel,
.thread-pane,
.thread-toolbar,
.picker-panel {
    background: var(--msg-panel);
    border: 1px solid var(--msg-line);
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.04);
}

.conversation-item {
    transition: background-color 0.18s ease, border-color 0.18s ease;
}

.conversation-item:hover {
    background: #fafbfd;
}

.conversation-item.active {
    background: linear-gradient(90deg, rgba(251, 114, 153, 0.1), rgba(251, 114, 153, 0.02));
    border-color: rgba(251, 114, 153, 0.18);
}

.thread-message {
    animation: fadeInUp 0.2s ease;
}

.thread-incoming {
    background: linear-gradient(180deg, #ffffff, #fbfcfe);
    border: 1px solid #e7edf5;
}

.thread-self {
    background: linear-gradient(180deg, #fff5f8, #ffffff);
    border: 1px solid #ffd5e3;
}

.thread-clickable {
    cursor: pointer;
}

.compact-scrollbar {
    scrollbar-width: thin;
    scrollbar-color: rgba(148, 153, 160, 0.45) transparent;
}

.compact-scrollbar::-webkit-scrollbar {
    width: 8px;
}

.compact-scrollbar::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(148, 153, 160, 0.35);
}

.thread-empty-art {
    color: #b6c2d2;
}

.thread-actions-sticky {
    position: sticky;
    bottom: 0;
    z-index: 5;
}

.reply-floating-shell {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    z-index: 60;
    width: min(30rem, calc(100vw - 1.5rem));
    max-height: calc(100vh - 4rem);
}

.reply-floating-card {
    background: rgba(255, 255, 255, 0.98);
    border: 1px solid rgba(237, 241, 245, 0.95);
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.16);
    backdrop-filter: blur(16px);
}

@media (min-width: 1280px) {
    .thread-pane-sticky {
        position: sticky;
        top: 1.5rem;
        height: calc(100vh - 10rem);
    }
}

@media (max-width: 768px) {
    .reply-floating-shell {
        right: 0.75rem;
        left: 0.75rem;
        bottom: 0.75rem;
        width: auto;
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
{{ end }}

{{ define "content" }}
<div class="message-shell -mx-8 -mt-4 px-8 pt-6 pb-10">
    <div class="mb-4 flex items-center justify-between gap-4">
        <div>
            <div class="inline-flex items-center rounded-full border border-gray-200 bg-white px-3 py-1 text-xs text-gray-500">
                <i class="ri-mail-unread-line mr-2 text-pink-500"></i>私信工作台
            </div>
            <h2 class="mt-2 text-3xl font-bold text-gray-900">私信箱</h2>
            <p class="mt-1 text-sm text-gray-500">点击待回复消息或按钮即可打开编辑栏，AI 回复会先自动填入内容。</p>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="openAutoRulesModal()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">
                <i class="ri-robot-line mr-1"></i>自动回复规则
            </button>
            <button onclick="loadMessages()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">
                <i class="ri-refresh-line mr-1"></i>刷新消息
            </button>
        </div>
    </div>

    <div class="thread-toolbar rounded-3xl p-4 mb-4">
        <div class="flex flex-wrap items-end gap-4">
            <div class="w-56">
                <label class="mb-2 block text-xs font-medium tracking-wide text-gray-400">消息状态</label>
                <select id="filter-status" class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-200">
                    <option value="-1">全部消息</option>
                    <option value="0">待回复</option>
                    <option value="1">已回复</option>
                    <option value="2">已忽略</option>
                </select>
            </div>
            <div class="message-panel rounded-3xl px-4 py-3 text-sm text-gray-500">
                <div class="text-xs text-gray-400">当前会话</div>
                <div id="conversation-current" class="mt-1 font-medium text-gray-800">未选择</div>
            </div>
            <div class="message-panel rounded-3xl px-4 py-3 text-sm text-gray-500">
                <div class="text-xs text-gray-400">统计</div>
                <div id="total-count" class="mt-1 font-medium text-gray-800">共 0 条私信</div>
            </div>
            <button onclick="openConversationPicker()" class="rounded-full bg-gray-900 px-5 py-2 text-sm text-white hover:bg-black transition">
                <i class="ri-chat-3-line mr-1"></i>选择会话
            </button>
        </div>
    </div>

    <div class="thread-pane thread-pane-sticky rounded-3xl overflow-hidden min-h-[72vh] flex flex-col">
        <div id="thread-header" class="px-6 py-5 border-b border-gray-100 bg-white"></div>
        <div id="thread-body" class="compact-scrollbar flex-1 overflow-y-auto bg-[#fafbfd] p-5"></div>
        <div id="thread-actions" class="thread-actions-sticky px-6 py-4 border-t border-gray-100 bg-white/95 backdrop-blur"></div>
    </div>
</div>

<div id="conversation-picker-modal" class="fixed inset-0 z-40 hidden overflow-y-auto bg-black/45 px-4 py-8">
    <div class="mx-auto flex min-h-full max-w-3xl items-center justify-center">
        <div class="picker-panel flex max-h-[85vh] min-h-0 w-full flex-col overflow-hidden rounded-[28px]">
            <div class="flex items-center justify-between border-b border-gray-100 px-6 py-4">
                <div>
                    <div class="text-lg font-semibold text-gray-900">选择私信会话</div>
                    <div class="mt-1 text-sm text-gray-400">按当前筛选结果展示，每次可翻到下一页继续选。</div>
                </div>
                <button type="button" onclick="closeConversationPicker()" class="text-gray-400 hover:text-pink-500 transition">
                    <i class="ri-close-line text-2xl"></i>
                </button>
            </div>
            <div id="conversation-picker-list" class="compact-scrollbar min-h-0 flex-1 overflow-y-auto divide-y divide-gray-100 bg-[#fafbfd]"></div>
            <div class="flex items-center justify-between gap-4 border-t border-gray-100 bg-white px-6 py-4">
                <div id="conversation-picker-page" class="text-sm text-gray-500">第 1 页</div>
                <div class="flex items-center gap-3">
                    <button onclick="prevConversationPage()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-300 hover:text-pink-500 transition">上一页</button>
                    <button onclick="nextConversationPage()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-300 hover:text-pink-500 transition">下一页</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 自动回复规则 Modal -->
<div id="auto-rules-modal" class="fixed inset-0 z-40 hidden overflow-y-auto bg-black/45 px-4 py-8">
    <div class="mx-auto flex min-h-full max-w-2xl items-center justify-center">
        <div class="picker-panel flex max-h-[90vh] min-h-0 w-full flex-col overflow-hidden rounded-[28px]">
            <div class="flex items-center justify-between border-b border-gray-100 px-6 py-4">
                <div>
                    <div class="text-lg font-semibold text-gray-900">私信自动回复规则</div>
                    <div class="mt-1 text-sm text-gray-400">按优先级从高到低匹配，命中第一条即回复。支持固定匹配、包含匹配、正则匹配。</div>
                </div>
                <button type="button" onclick="Modal.hide('auto-rules-modal')" class="text-gray-400 hover:text-pink-500 transition"><i class="ri-close-line text-2xl"></i></button>
            </div>
            <div class="compact-scrollbar min-h-0 flex-1 overflow-y-auto p-5 space-y-3" id="auto-rules-list"></div>
            <div class="border-t border-gray-100 bg-white px-6 py-4">
                <div class="text-sm font-semibold text-gray-700 mb-3">新增规则</div>

                    <div>
                        <label class="block text-xs text-gray-500 mb-1">规则名称</label>
                        <input id="new-rule-name" type="text" class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-200" placeholder="例：商务合作">

                    <div>

                            <option value="exact">固定匹配（完全相等）</option>
                            <option value="contains">包含匹配（含关键词）</option>
                            <option value="regex">正则匹配</option>

                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">匹配内容 / 正则</label>
                        <input id="new-rule-pattern" type="text" class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-200" placeholder="输入关键词或正则表达式">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">优先级（数字越大越先匹配）</label>
                        <input id="new-rule-priority" type="number" value="0" class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-200">

                        <label class="block text-xs text-gray-500 mb-1">回复内容</label>
                        <textarea id="new-rule-reply" rows="3" class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-200" placeholder="自动发送的回复文字"></textarea>
                    </div>
                </div>

                    <button onclick="submitNewAutoRule()" class="rounded-full bg-pink-500 px-5 py-2 text-sm text-white hover:bg-pink-600 transition">添加规则</button>
                </div>
            </div>
        </div>
    </div>
</div>

        <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4 bg-gray-50/90">
            <div>

            </div>
            <button type="button" onclick="messageReplyWorkspace.close()" class="text-gray-400 hover:text-pink-500 transition">

        <div class="compact-scrollbar overflow-y-auto p-5 space-y-4">

{{ define "scripts" }}
<script src="/admin/static/js/reply-workspace.js"></script>
<script>
let currentPage = 1;
const pageSize = 40;
let currentMessages = [];
let currentSessions = [];
let totalMessages = 0;
let activeConversationId = null;

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatTime(value) {
    if (!value) return '刚刚';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return String(value);
    const now = new Date();
    const diff = now.getTime() - date.getTime();
    if (diff < 60 * 1000) return '刚刚';
    if (diff < 60 * 60 * 1000) return `${Math.floor(diff / (60 * 1000))} 分钟前`;
    if (diff < 24 * 60 * 60 * 1000) return `${Math.floor(diff / (60 * 60 * 1000))} 小时前`;
    const month = `${date.getMonth() + 1}`.padStart(2, '0');
    const day = `${date.getDate()}`.padStart(2, '0');
    const hour = `${date.getHours()}`.padStart(2, '0');
    const minute = `${date.getMinutes()}`.padStart(2, '0');
    return `${month}-${day} ${hour}:${minute}`;
}

function formatAbsoluteTime(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    const month = `${date.getMonth() + 1}`.padStart(2, '0');
    const day = `${date.getDate()}`.padStart(2, '0');
    const hour = `${date.getHours()}`.padStart(2, '0');
    const minute = `${date.getMinutes()}`.padStart(2, '0');
    return `${month}-${day} ${hour}:${minute}`;
}

function avatarHtml(name, face, size = 'w-12 h-12') {
    if (face) {
        return `<img src="${escapeHtml(face)}" alt="${escapeHtml(name || '用户')}" class="${size} rounded-full object-cover border border-gray-100" referrerpolicy="no-referrer">`;
    }
    return `<div class="${size} rounded-full bg-gradient-to-br from-pink-100 to-blue-100 text-pink-600 flex items-center justify-center font-semibold border border-pink-100">${escapeHtml((name || 'U').slice(0, 1))}</div>`;
}

function groupConversations(messages) {
    const conversationMap = new Map();
    for (const item of messages) {
        const conversationId = item.conversation_uid || item.conversation_id || 0;
        const fallbackSenderId = item.sender_uid || item.sender_id || item.SenderID || 0;
        const sessionId = conversationId || (!item.is_from_self ? fallbackSenderId : 0);
        if (!sessionId) continue;

        const existing = conversationMap.get(sessionId) || {
            conversationId: sessionId,
            conversationName: item.conversation_name || item.sender_name || '用户',
            conversationFace: item.conversation_face || item.sender_face || '',
            messages: []
        };
        existing.messages.push(item);
        if (!existing.conversationFace && (item.conversation_face || item.sender_face)) {
            existing.conversationFace = item.conversation_face || item.sender_face;
        }
        if (!existing.conversationName && (item.conversation_name || item.sender_name)) {
            existing.conversationName = item.conversation_name || item.sender_name;
        }
        conversationMap.set(sessionId, existing);
    }

    return Array.from(conversationMap.values()).map(session => {
        session.messages.sort((a, b) => new Date(a.message_time).getTime() - new Date(b.message_time).getTime());
        session.latest = session.messages[session.messages.length - 1] || null;
        session.pending = session.messages.filter(m => !m.is_from_self && m.reply_status === 0).length;
        return session;
    }).sort((a, b) => new Date(b.latest?.message_time || 0).getTime() - new Date(a.latest?.message_time || 0).getTime());
}

function hasPersistedReply(session, sourceMessage) {
    return session.messages.some(item => {
        if (!item.is_from_self) return false;
        if ((item.content || '').trim() !== (sourceMessage.reply_content || '').trim()) return false;
        const itemTime = new Date(item.message_time || 0).getTime();
        const sourceTime = new Date(sourceMessage.message_time || 0).getTime();
        return itemTime >= sourceTime;
    });
}

function buildThreadTimeline(session) {
    const timeline = [];
    for (const item of session.messages) {
        timeline.push({
            type: item.is_from_self ? 'self' : 'incoming',
            messageId: item.message_id,
            senderName: item.sender_name || (item.is_from_self ? '我' : session.conversationName),
            senderFace: item.sender_face || (item.is_from_self ? '' : session.conversationFace),
            content: item.content || '',
            messageTime: item.message_time,
            replyStatus: item.reply_status,
            isAIReply: item.is_ai_reply,
            source: item,
            synthetic: false
        });

        if (!item.is_from_self && item.reply_content && !hasPersistedReply(session, item)) {
            timeline.push({
                type: 'self',
                messageId: `${item.message_id}-reply-record`,
                senderName: '我',
                senderFace: '',
                content: item.reply_content,
                messageTime: item.message_time,
                replyStatus: 1,
                isAIReply: item.is_ai_reply,
                source: item,
                synthetic: true
            });
        }
    }

    return timeline.sort((a, b) => new Date(a.messageTime || 0).getTime() - new Date(b.messageTime || 0).getTime());
}

async function loadMessages() {
    const status = document.getElementById('filter-status').value;
    try {
        const data = await api(`/admin/api/messages?reply_status=${status}&page=${currentPage}&page_size=${pageSize}`);
        currentMessages = data.messages || [];
        totalMessages = data.total || 0;
        currentSessions = groupConversations(currentMessages);
        document.getElementById('total-count').textContent = `共 ${totalMessages} 条私信`;
        renderConversationPicker();
        renderMessageWorkspace();
        return data;
    } catch (error) {
        showToast('加载失败: ' + error.message, 'error');
        return null;
    }
}

function renderMessageWorkspace() {
    if (!currentSessions.length) {
        activeConversationId = null;
        renderEmptyThread();
        return;
    }
    if (!currentSessions.some(item => item.conversationId === activeConversationId)) {
        activeConversationId = currentSessions[0].conversationId;
    }
    renderThread(currentSessions.find(item => item.conversationId === activeConversationId));
}

function renderConversationPicker() {
    const container = document.getElementById('conversation-picker-list');
    document.getElementById('conversation-picker-page').textContent = `第 ${currentPage} 页`;

    if (!currentSessions.length) {
        container.innerHTML = `
            <div class="p-10 text-center text-gray-400">
                <i class="ri-mail-forbid-line text-5xl"></i>
                <p class="mt-3">当前页没有可选会话</p>
            </div>
        `;
        return;
    }

    container.innerHTML = currentSessions.map(session => {
        const latest = session.latest || {};
        const preview = latest.content || latest.reply_content || '暂无消息内容';
        const active = session.conversationId === activeConversationId;
        return `
            <button onclick="selectConversation(${session.conversationId})" class="conversation-item ${active ? 'active' : ''} w-full border-l-4 ${active ? 'border-pink-400' : 'border-transparent'} px-6 py-4 text-left">
                <div class="flex items-start gap-3">
                    <div class="shrink-0">${avatarHtml(session.conversationName, session.conversationFace)}</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center justify-between gap-3">
                            <div class="truncate text-sm font-semibold text-gray-900">${escapeHtml(session.conversationName)}</div>
                            <div class="text-xs text-gray-400">${formatTime(latest.message_time)}</div>
                        </div>
                        <div class="mt-1 truncate text-sm text-gray-500">${escapeHtml(preview)}</div>
                        <div class="mt-2 flex items-center gap-2 text-xs">
                            ${session.pending > 0 ? `<span class="rounded-full border border-pink-100 bg-pink-50 px-2 py-0.5 text-pink-600">待回复 ${session.pending}</span>` : '<span class="rounded-full border border-gray-100 bg-gray-50 px-2 py-0.5 text-gray-500">已处理</span>'}
                            <span class="text-gray-400">${session.messages.length} 条</span>
                        </div>
                    </div>
                </div>
            </button>
        `;
    }).join('');
}

function renderEmptyThread() {
    document.getElementById('conversation-current').textContent = '未选择';
    document.getElementById('thread-header').innerHTML = `
        <div class="flex items-center justify-between gap-4">
            <div>
                <div class="text-lg font-semibold text-gray-800">选择一个会话</div>
                <div class="mt-1 text-sm text-gray-400">点击上方“选择会话”打开弹出列表。</div>
            </div>
            <button onclick="openConversationPicker()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">打开会话列表</button>
        </div>
    `;
    document.getElementById('thread-body').innerHTML = `
        <div class="flex h-full min-h-[420px] flex-col items-center justify-center text-center">
            <div class="thread-empty-art text-8xl leading-none">◌◌◌</div>
            <div class="mt-6 text-lg text-gray-400">还没有选中会话</div>
            <div class="mt-2 text-sm text-gray-300">从弹出选择框里选一个私信会话继续处理。</div>
        </div>
    `;
    document.getElementById('thread-actions').innerHTML = `
        <div class="text-sm text-gray-400">暂无可执行操作</div>
    `;
}

function openConversationPicker() {
    Modal.show('conversation-picker-modal');
}

function closeConversationPicker() {
    Modal.hide('conversation-picker-modal');
}

function selectConversation(conversationId) {
    activeConversationId = conversationId;
    renderConversationPicker();
    renderMessageWorkspace();
    closeConversationPicker();
}

function prevConversationPage() {
    if (currentPage <= 1) return;
    currentPage -= 1;
    loadMessages();
}

function nextConversationPage() {
    if (currentMessages.length < pageSize) return;
    currentPage += 1;
    loadMessages();
}

function renderThread(session) {
    if (!session) {
        renderEmptyThread();
        return;
    }

    const latest = session.latest || {};
    document.getElementById('conversation-current').textContent = session.conversationName || '未命名会话';
    document.getElementById('thread-header').innerHTML = `
        <div class="flex items-center justify-between gap-4">
            <div class="flex min-w-0 items-center space-x-4">
                ${avatarHtml(session.conversationName, session.conversationFace, 'w-14 h-14')}
                <div class="min-w-0">
                    <div class="truncate text-lg font-semibold text-gray-900">${escapeHtml(session.conversationName)}</div>
                    <div class="mt-1 text-sm text-gray-400">最近消息 ${formatTime(latest.message_time)}</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right text-xs text-gray-400">
                    <div>会话内消息 ${session.messages.length} 条</div>
                    <div class="mt-1">待回复 ${session.pending} 条</div>
                </div>
                <button onclick="openConversationPicker()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">切换会话</button>
            </div>
        </div>
    `;

    const timeline = buildThreadTimeline(session);
    document.getElementById('thread-body').innerHTML = timeline.map(entry => {
        const fromSelf = entry.type === 'self';
        const item = entry.source;
        const pending = item.reply_status === 0;
        const timeLabel = formatAbsoluteTime(entry.messageTime);
        return `
            <div class="thread-message mb-4 flex ${fromSelf ? 'justify-end' : 'items-start space-x-3'}">
                ${fromSelf ? '' : `<div class="shrink-0">${avatarHtml(entry.senderName || session.conversationName, entry.senderFace || session.conversationFace)}</div>`}
                <div class="min-w-0 max-w-[78%] ${fromSelf ? 'ml-auto' : ''}">
                    <div class="${fromSelf ? 'thread-self' : 'thread-incoming'} ${!fromSelf && pending ? 'thread-clickable' : ''} rounded-[20px] px-4 py-3 shadow-sm" ${!fromSelf && pending ? `onclick="openMessageReply(${item.message_id}, ${session.conversationId}, false)"` : ''}>
                        <div class="mb-2 flex flex-wrap items-center gap-2 text-xs text-gray-400">
                            <span class="font-medium text-gray-700">${escapeHtml(entry.senderName || (fromSelf ? '我' : session.conversationName))}</span>
                            <span>${timeLabel || formatTime(entry.messageTime)}</span>
                            ${fromSelf ? `<span class="rounded-full border border-pink-100 bg-pink-50 px-2 py-0.5 text-pink-600">${entry.synthetic ? '回复记录' : '我发出的'}</span>` : pending ? '<span class="rounded-full border border-pink-100 bg-pink-50 px-2 py-0.5 text-pink-600">待回复</span>' : item.reply_status === 2 ? '<span class="rounded-full border border-gray-100 bg-gray-50 px-2 py-0.5 text-gray-500">已忽略</span>' : '<span class="rounded-full border border-green-100 bg-green-50 px-2 py-0.5 text-green-600">已回复</span>'}
                            ${entry.isAIReply ? '<span class="rounded-full border border-purple-100 bg-purple-50 px-2 py-0.5 text-purple-600">AI</span>' : ''}
                        </div>
                        <div class="whitespace-pre-wrap break-words text-[15px] leading-7 text-gray-700">${escapeHtml(entry.content || '')}</div>
                    </div>
                    ${!fromSelf && pending ? `
                        <div class="mt-2 ml-6 flex flex-wrap items-center gap-2 text-sm">
                            <button onclick="event.stopPropagation(); aiReply(${item.message_id}, ${session.conversationId})" class="inline-flex items-center rounded-full border border-pink-100 bg-pink-50 px-3 py-1.5 text-pink-600 hover:bg-pink-100 transition"><i class="ri-robot-2-line mr-1"></i>AI 回复</button>
                            <button onclick="event.stopPropagation(); manualReply(${item.message_id}, ${session.conversationId})" class="inline-flex items-center rounded-full border border-gray-200 bg-white px-3 py-1.5 text-gray-600 hover:border-pink-200 hover:text-pink-500 transition"><i class="ri-edit-line mr-1"></i>手动回复</button>
                            <button onclick="event.stopPropagation(); ignore(${item.message_id})" class="inline-flex items-center rounded-full border border-gray-200 bg-white px-3 py-1.5 text-gray-500 hover:border-gray-300 transition"><i class="ri-eye-off-line mr-1"></i>忽略</button>
                        </div>
                    ` : ''}
                </div>
                ${fromSelf ? `<div class="shrink-0 ml-4">${avatarHtml(entry.senderName || '我', entry.senderFace || '', 'w-12 h-12')}</div>` : ''}
            </div>
        `;
    }).join('');

    const pendingItem = [...session.messages].reverse().find(item => !item.is_from_self && item.reply_status === 0);
    document.getElementById('thread-actions').innerHTML = pendingItem ? `
        <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
                <div class="text-sm font-medium text-gray-800">当前会话存在待处理消息</div>
                <div class="mt-1 text-xs text-gray-400">打开编辑栏后可直接修改，AI 回复会先自动填充内容。</div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="aiReply(${pendingItem.message_id}, ${session.conversationId})" class="rounded-full bg-pink-500 px-4 py-2 text-sm text-white hover:bg-pink-600 transition">AI 回复最近一条</button>
                <button onclick="manualReply(${pendingItem.message_id}, ${session.conversationId})" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">手动回复</button>
            </div>
        </div>
    ` : `
        <div class="flex items-center justify-between gap-4">
            <div>
                <div class="text-sm font-medium text-gray-800">当前会话已处理完成</div>
                <div class="mt-1 text-xs text-gray-400">如需切换对象，直接打开会话选择框即可。</div>
            </div>
            <button onclick="openConversationPicker()" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">切换会话</button>
        </div>
    `;
}

function openMessageReply(messageId, conversationId, autoGenerate = false) {
    messageReplyWorkspace.open(messageId, { autoGenerate, conversationId }).catch(err => {
        showToast('打开编辑栏失败: ' + err.message, 'error');
    });
}

function manualReply(messageId, conversationId) {
    openMessageReply(messageId, conversationId, false);
}

async function ignore(messageId) {
    if (!confirm('确定忽略这条私信吗？')) return;

    try {
        await api(`/admin/api/messages/${messageId}/ignore`, { method: 'POST' });
        showToast('已忽略', 'success');
        loadMessages();
    } catch (error) {
        showToast('操作失败: ' + error.message, 'error');
    }
}

function aiReply(messageId, conversationId) {
    openMessageReply(messageId, conversationId, true);
}

// --- 自动回复规则 ---
let autoRules = [];

async function openAutoRulesModal() {
    Modal.show('auto-rules-modal');
    await loadAutoRules();
}

async function loadAutoRules() {
    try {
        const data = await api('/admin/api/messages/auto-rules');
        autoRules = data.rules || [];
        renderAutoRules();
    } catch (err) {
        showToast('加载规则失败: ' + err.message, 'error');
    }
}

function matchTypeLabel(t) {
    return t === 'exact' ? '固定' : t === 'contains' ? '包含' : t === 'regex' ? '正则' : t;
}

function renderAutoRules() {
    const container = document.getElementById('auto-rules-list');
    if (!autoRules.length) {
        container.innerHTML = '<div class="py-8 text-center text-gray-400">暂无规则，在下方添加第一条</div>';
        return;
    }
    container.innerHTML = autoRules.map(rule => `
        <div class="rounded-2xl border ${rule.enabled ? 'border-pink-100 bg-pink-50/30' : 'border-gray-100 bg-gray-50'} p-4">
            <div class="flex items-start justify-between gap-3">
                <div class="min-w-0 flex-1">
                    <div class="flex flex-wrap items-center gap-2 text-sm">
                        <span class="font-semibold text-gray-900">${escapeHtml(rule.name || '未命名')}</span>
                        <span class="rounded-full border px-2 py-0.5 text-xs ${rule.enabled ? 'border-pink-100 bg-pink-50 text-pink-600' : 'border-gray-200 bg-gray-100 text-gray-500'}">${rule.enabled ? '启用' : '禁用'}</span>
                        <span class="rounded-full border border-blue-100 bg-blue-50 px-2 py-0.5 text-xs text-blue-600">${matchTypeLabel(rule.match_type)}</span>
                        <span class="text-xs text-gray-400">优先级 ${rule.priority} · 命中 ${rule.match_count} 次</span>
                    </div>
                    <div class="mt-2 text-xs text-gray-500">匹配: <code class="rounded bg-gray-100 px-1">${escapeHtml(rule.pattern)}</code></div>
                    <div class="mt-1 text-xs text-gray-500">回复: ${escapeHtml(rule.reply)}</div>
                </div>
                <div class="flex shrink-0 items-center gap-2">
                    <button onclick="toggleAutoRule(${rule.id}, ${!rule.enabled})" class="rounded-full border border-gray-200 bg-white px-3 py-1 text-xs text-gray-600 hover:border-pink-200 hover:text-pink-500 transition">${rule.enabled ? '禁用' : '启用'}</button>
                    <button onclick="deleteAutoRule(${rule.id})" class="rounded-full border border-red-100 bg-white px-3 py-1 text-xs text-red-500 hover:bg-red-50 transition">删除</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function submitNewAutoRule() {
    const name = document.getElementById('new-rule-name').value.trim();
    const matchType = document.getElementById('new-rule-type').value;
    const pattern = document.getElementById('new-rule-pattern').value.trim();
    const reply = document.getElementById('new-rule-reply').value.trim();
    const priority = parseInt(document.getElementById('new-rule-priority').value || '0', 10);
    if (!pattern) { showToast('请输入匹配内容', 'warning'); return; }
    if (!reply) { showToast('请输入回复内容', 'warning'); return; }
    try {
        await api('/admin/api/messages/auto-rules', {
            method: 'POST',
            body: { name: name || pattern, match_type: matchType, pattern, reply, priority, enabled: true }
        });
        showToast('规则已添加', 'success');
        document.getElementById('new-rule-name').value = '';
        document.getElementById('new-rule-pattern').value = '';
        document.getElementById('new-rule-reply').value = '';
        document.getElementById('new-rule-priority').value = '0';
        await loadAutoRules();
    } catch (err) {
        showToast('添加失败: ' + err.message, 'error');
    }
}

async function toggleAutoRule(id, enabled) {
    const rule = autoRules.find(r => r.id === id);
    if (!rule) return;
    try {
        await api(`/admin/api/messages/auto-rules/${id}`, {
            method: 'PUT',
            body: { ...rule, enabled }
        });
        await loadAutoRules();
    } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
    }
}

async function deleteAutoRule(id) {
    if (!confirm('确定删除这条自动回复规则？')) return;
    try {
        await api(`/admin/api/messages/auto-rules/${id}`, { method: 'DELETE' });
        showToast('已删除', 'success');
        await loadAutoRules();
    } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    window.__replyWorkspaceInstances.message = new ReplyWorkspaceModal({
        channel: 'message',
        modalId: 'reply-workspace-modal',
        apiPrefix: '/admin',
        onSent: () => loadMessages()
    });
    window.messageReplyWorkspace = window.__replyWorkspaceInstances.message;
    document.getElementById('filter-status').addEventListener('change', () => {
        currentPage = 1;
        loadMessages();
    });
    loadMessages();
    setInterval(loadMessages, 60 * 1000);
});
</script>
