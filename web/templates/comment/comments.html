{{ define "head" }}
<style>
:root {
    --bili-pink: #fb7299;
    --bili-pink-soft: #fff1f5;
    --bili-line: #edf1f5;
}

.comment-shell {
    background:
        radial-gradient(circle at top right, rgba(251, 114, 153, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, #f5f7fb 100%);
}

.bili-toolbar,
.comment-panel,
.comment-stream,
.video-strip,
.video-selector-panel {
    background: #ffffff;
    border: 1px solid var(--bili-line);
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.04);
}

.comment-row {
    transition: background-color 0.18s ease, border-color 0.18s ease;
}

.comment-row:hover {
    background: linear-gradient(90deg, rgba(251, 114, 153, 0.04), rgba(255, 255, 255, 0));
}

.comment-row.replyable {
    cursor: pointer;
}

.compact-scrollbar {
    scrollbar-width: thin;
    scrollbar-color: rgba(148, 153, 160, 0.45) transparent;
}

.compact-scrollbar::-webkit-scrollbar {
    width: 8px;
}

.compact-scrollbar::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(148, 153, 160, 0.35);
}

.bili-avatar {
    background: linear-gradient(135deg, #ffe0ea, #f4f8ff);
    color: var(--bili-pink);
}

.reply-bubble {
    background: #f7f9fc;
    border: 1px solid #e9eef4;
}

.comment-action {
    color: #9499a0;
}

.comment-action:hover {
    color: var(--bili-pink);
}

.video-card:hover img {
    transform: scale(1.04);
}

.status-pill {
    border: 1px solid transparent;
}

.status-pending {
    background: #fff1f5;
    color: #d43f6e;
    border-color: #ffd6e2;
}

.status-done {
    background: #eefbf3;
    color: #228b5b;
    border-color: #cdeedc;
}

.status-muted {
    background: #f4f6f8;
    color: #7b818a;
    border-color: #e6eaf0;
}

.selector-item {
    transition: background-color 0.18s ease, border-color 0.18s ease;
}

.selector-item:hover {
    background: linear-gradient(90deg, rgba(251, 114, 153, 0.05), rgba(255, 255, 255, 0));
}

.reply-floating-shell {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    z-index: 60;
    width: min(30rem, calc(100vw - 1.5rem));
    max-height: calc(100vh - 4rem);
}

.reply-floating-card {
    background: rgba(255, 255, 255, 0.98);
    border: 1px solid rgba(237, 241, 245, 0.95);
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.16);
    backdrop-filter: blur(16px);
}

@media (max-width: 768px) {
    .reply-floating-shell {
        right: 0.75rem;
        left: 0.75rem;
        bottom: 0.75rem;
        width: auto;
    }
}
</style>
{{ end }}

{{ define "content" }}

    <div class="mb-4 flex items-center justify-between gap-4">
        <div>
            <div class="inline-flex items-center rounded-full bg-white px-3 py-1 text-xs text-gray-500 border border-gray-200">
                <i class="ri-chat-3-line mr-2 text-pink-500"></i>评论工作台
            </div>
            <h2 class="mt-2 text-3xl font-bold text-gray-900">评论区</h2>

        </div>

                    <option value="2">已忽略</option>

            <div class="flex items-center gap-3">

        </div>

    <div class="comment-panel rounded-3xl overflow-hidden">

                <div>
                    <h3 class="text-lg font-semibold text-gray-900">评论流</h3>
                    <p class="text-xs text-gray-400 mt-1">按时间倒序，待回复评论可直接点击打开编辑栏</p>

                    <div class="text-xs text-gray-400">每 60 秒自动刷新</div>

                <div class="text-xs text-gray-400">当前仅展示已同步到本地的评论</div>
                <div id="pagination" class="flex space-x-2"></div>

</div>

<div id="video-selector-modal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/45 px-4 py-8">
    <div class="mx-auto flex min-h-full max-w-4xl items-center justify-center">

{{ define "scripts" }}
<script src="/admin/static/js/reply-workspace.js"></script>
<script>
let currentPage = 1;
const pageSize = 20;
let myVideosPage = 1;
const myVideosPageSize = 20;
let myVideos = [];
let myVideosHasMore = false;

function getApiPrefix() {
    return window.location.pathname.startsWith('/admin') ? '/admin' : '';
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatTime(value) {
    if (!value) return '刚刚';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return String(value);
    const now = new Date();
    const diff = now.getTime() - date.getTime();
    if (diff < 60 * 1000) return '刚刚';
    if (diff < 60 * 60 * 1000) return `${Math.floor(diff / (60 * 1000))}分钟前`;
    if (diff < 24 * 60 * 60 * 1000) return `${Math.floor(diff / (60 * 60 * 1000))}小时前`;
    const month = `${date.getMonth() + 1}`.padStart(2, '0');
    const day = `${date.getDate()}`.padStart(2, '0');
    const hour = `${date.getHours()}`.padStart(2, '0');
    const minute = `${date.getMinutes()}`.padStart(2, '0');
    return `${month}-${day} ${hour}:${minute}`;
}

function formatShortDate(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    return `${d.getMonth() + 1}-${d.getDate().toString().padStart(2, '0')}`;
}

function commentStatusMeta(status) {
    if (status === 1) return { text: '已回复', className: 'status-pill status-done' };
    if (status === 2) return { text: '已忽略', className: 'status-pill status-muted' };
    return { text: '待回复', className: 'status-pill status-pending' };
}

function commentAvatar(comment) {
    const name = comment.author_name || '用户';
    if (comment.author_face) {
        return `<img src="${escapeHtml(comment.author_face)}" alt="${escapeHtml(name)}" class="w-12 h-12 rounded-full object-cover border border-gray-100" referrerpolicy="no-referrer">`;
    }
    return `<div class="w-12 h-12 rounded-full bili-avatar flex items-center justify-center font-semibold text-sm border border-pink-100">${escapeHtml(name.slice(0, 1))}</div>`;
}

function updateCommentSummary(comments, total) {
    const pending = comments.filter(item => item.reply_status === 0).length;
    document.getElementById('summary-bvid').textContent = document.getElementById('filter-bvid').value || '未指定投稿';
    document.getElementById('summary-pending').textContent = pending;
    document.getElementById('summary-page').textContent = comments.length;
    document.getElementById('total-count').textContent = `共 ${total || 0} 条`;
}

function renderMyVideos() {
    const container = document.getElementById('my-videos-list');
    document.getElementById('my-videos-page').textContent = `第 ${myVideosPage} 页`;

    if (!myVideos.length) {
        container.innerHTML = `
            <div class="p-12 text-center text-gray-400">
                <i class="ri-video-line text-5xl"></i>
                <p class="mt-3">当前页没有可选投稿</p>
            </div>
        `;
        return;
    }

    const activeBvid = document.getElementById('filter-bvid').value;
    container.innerHTML = `<div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">${myVideos.map(video => {
        const active = activeBvid === video.bvid;
        const cover = video.pic && video.pic.startsWith('http') ? video.pic : `https:${video.pic || ''}`;
        return `
            <button class="selector-item w-full rounded-[24px] border p-4 text-left ${active ? 'border-pink-300 bg-pink-50/70' : 'border-gray-100 bg-white'}" onclick="selectVideo('${video.bvid}')">
                <div class="overflow-hidden rounded-2xl bg-gray-100">
                    <div class="aspect-video w-full">
                        ${cover ? `<img src="${escapeHtml(cover)}" class="h-full w-full object-cover" referrerpolicy="no-referrer">` : '<div class="flex h-full items-center justify-center text-gray-300"><i class="ri-video-line text-3xl"></i></div>'}
                    </div>
                </div>
                <div class="mt-4 min-w-0">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div class="line-clamp-2 text-sm font-semibold text-gray-900">${escapeHtml(video.title || video.bvid)}</div>
                            <div class="mt-1 text-xs text-gray-500">${escapeHtml(video.bvid)}</div>
                        </div>
                        <span class="rounded-full px-2.5 py-1 text-xs ${active ? 'border border-pink-100 bg-white text-pink-600' : 'border border-gray-100 bg-gray-50 text-gray-500'}">${active ? '当前筛选' : '选择'}</span>
                    </div>
                    <div class="mt-3 flex flex-wrap items-center gap-3 text-xs text-gray-400">
                        <span class="inline-flex items-center"><i class="ri-play-circle-line mr-1"></i>${formatNumber(video.play)}</span>
                        <span class="inline-flex items-center"><i class="ri-message-2-line mr-1"></i>${formatNumber(video.comment)}</span>
                        <span>${formatShortDate(video.created)}</span>
                        <span>${escapeHtml(video.length || '00:00')}</span>
                    </div>
                </div>
            </button>
        `;
    }).join('')}</div>`;
}

async function loadMyVideosPage() {
    const container = document.getElementById('my-videos-list');
    container.innerHTML = '<div class="p-12 text-center text-gray-400"><i class="ri-loader-4-line animate-spin text-4xl text-pink-400"></i><p class="mt-3 text-gray-500">正在拉取投稿列表...</p></div>';

    try {
        const response = await api(`${getApiPrefix()}/api/comments/my-videos?page=${myVideosPage}&page_size=${myVideosPageSize}`);
        myVideos = response.list?.vlist || [];
        myVideosHasMore = !!response.has_more;

        if (myVideos.length === 0) {
            container.innerHTML = '<div class="p-12 text-center text-gray-400"><i class="ri-video-line text-5xl mb-2"></i><p>账号暂无投稿，或 Cookie 已过期</p></div>';
            return;
        }

        renderMyVideos();
    } catch (err) {
        container.innerHTML = `<div class="p-12 text-center text-red-500"><i class="ri-error-warning-line text-4xl mb-2"></i><p>加载失败: ${escapeHtml(err.message)}</p></div>`;
    }
}

function openVideoSelector() {
    myVideosPage = 1;
    Modal.show('video-selector-modal');
    loadMyVideosPage();
}

function closeVideoSelector() {
    Modal.hide('video-selector-modal');
}

function selectVideo(bvid) {
    document.getElementById('filter-bvid').value = bvid;
    closeVideoSelector();
    currentPage = 1;
    loadComments();
}

function prevVideoSelectorPage() {
    if (myVideosPage <= 1) return;
    myVideosPage -= 1;
    loadMyVideosPage();
}

function nextVideoSelectorPage() {
    if (!myVideosHasMore) return;
    myVideosPage += 1;
    loadMyVideosPage();
}

async function loadComments() {
    const bvid = document.getElementById('filter-bvid').value;
    const status = document.getElementById('filter-status').value;

    try {
        const data = await api(`${getApiPrefix()}/api/comments?video_bvid=${bvid}&reply_status=${status}&page=${currentPage}&page_size=${pageSize}`);
        renderComments(data.comments || []);
        renderPagination(data.total || 0);
        updateCommentSummary(data.comments || [], data.total || 0);
        return data;
    } catch (error) {
        showToast('加载评论失败: ' + error.message, 'error');
        return null;
    }
}

function renderComments(comments) {
    const container = document.getElementById('comment-list');

    if (comments.length === 0) {
        container.innerHTML = `
            <div class="p-16 text-center text-gray-400 bg-white">
                <i class="ri-chat-off-line text-6xl mb-4 text-gray-300"></i>
                <p class="text-base">当前筛选下没有评论</p>
                <p class="mt-2 text-sm text-gray-400">可以切换投稿、状态，或者等待后台轮询继续同步。</p>
            </div>
        `;
        return;
    }

    container.innerHTML = comments.map(c => {
        const status = commentStatusMeta(c.reply_status);
        return `
            <div class="comment-row ${c.reply_status === 0 ? 'replyable' : ''} px-5 py-4" ${c.reply_status === 0 ? `onclick="openCommentReply(${c.comment_id}, false)"` : ''}>
                <div class="flex items-start space-x-4">
                    <div class="flex-shrink-0">${commentAvatar(c)}</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-x-3 gap-y-2">
                            <span class="font-semibold text-gray-900">${escapeHtml(c.author_name || '用户')}</span>
                            <span class="${status.className} inline-flex items-center rounded-full px-2.5 py-1 text-xs">${status.text}</span>
                            ${c.is_ai_reply ? '<span class="inline-flex items-center rounded-full bg-purple-50 px-2.5 py-1 text-xs text-purple-600 border border-purple-100"><i class="ri-robot-2-line mr-1"></i>AI 回复</span>' : ''}
                            <span class="text-xs text-gray-400">${formatTime(c.comment_time)}</span>
                            <span class="inline-flex items-center rounded-full bg-gray-50 px-2.5 py-1 text-xs text-gray-500 border border-gray-100"><i class="ri-video-line mr-1"></i>${escapeHtml(c.video_bvid || '未知 BV')}</span>
                        </div>
                        <div class="mt-2 text-[15px] leading-7 text-gray-700 whitespace-pre-wrap break-words">${escapeHtml(c.content)}</div>
                        ${c.reply_content ? `
                            <div class="reply-bubble mt-3 rounded-2xl px-4 py-3 relative">
                                <div class="text-xs text-gray-400 mb-1">UP 主回复</div>
                                <p class="text-sm text-gray-700 whitespace-pre-wrap break-words">${escapeHtml(c.reply_content)}</p>
                            </div>
                        ` : ''}
                        <div class="mt-3 flex flex-wrap items-center gap-x-4 gap-y-2 text-sm">
                            ${c.reply_status === 0 ? `
                                <button onclick="event.stopPropagation(); aiReply(${c.comment_id})" class="comment-action inline-flex items-center transition"><i class="ri-robot-2-line mr-1"></i><span>AI 回复</span></button>
                                <button onclick="event.stopPropagation(); manualReply(${c.comment_id})" class="comment-action inline-flex items-center transition"><i class="ri-edit-2-line mr-1"></i><span>手动回复</span></button>
                                <button onclick="event.stopPropagation(); ignore(${c.comment_id})" class="comment-action inline-flex items-center transition"><i class="ri-eye-off-line mr-1"></i><span>忽略</span></button>
                            ` : ''}
                            <span class="ml-auto inline-flex items-center text-xs text-gray-400"><i class="ri-history-line mr-1"></i>评论 ID ${c.comment_id}</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }

    let html = '';
    for (let i = 1; i <= totalPages && i <= 5; i++) {
        html += `<button onclick="goToPage(${i})" class="w-9 h-9 flex items-center justify-center rounded-full text-sm transition ${i === currentPage ? 'bg-pink-500 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:border-pink-300 hover:text-pink-500'}">${i}</button>`;
    }
    container.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadComments();
}

function openCommentReply(commentId, autoGenerate = false) {
    commentReplyWorkspace.open(commentId, { autoGenerate }).catch(err => {
        showToast('打开编辑栏失败: ' + err.message, 'error');
    });
}

function aiReply(commentId) {
    openCommentReply(commentId, true);
}

function manualReply(commentId) {
    openCommentReply(commentId, false);
}

async function ignore(commentId) {
    if (!confirm('确定忽略此评论?')) return;

    try {
        await api(`${getApiPrefix()}/api/comments/${commentId}/ignore`, { method: 'POST' });
        showToast('已忽略', 'success');
        loadComments();
    } catch (error) {
        showToast('操作失败: ' + error.message, 'error');
    }
}

function formatNumber(num) {
    if (!num) return '0';
    if (num >= 10000) {
        return (num / 10000).toFixed(1) + '万';
    }
    return num.toString();
}

document.addEventListener('DOMContentLoaded', () => {
    window.__replyWorkspaceInstances.comment = new ReplyWorkspaceModal({
        channel: 'comment',
        modalId: 'reply-workspace-modal',
        apiPrefix: getApiPrefix(),
        onSent: () => loadComments()
    });
    window.commentReplyWorkspace = window.__replyWorkspaceInstances.comment;
    loadComments();
    setInterval(loadComments, 60 * 1000);
});
</script>
{{ end }}
