{{ define "content" }}
<div class="max-w-7xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">互动管理</h2>
            <p class="mt-1 text-sm text-pink-600">选择粉丝与投稿，执行点赞/投币/收藏/三连，真实互动数据自动轮询更新。</p>
        </div>
        <div class="flex items-center gap-2">
            <button type="button" onclick="loadOperationStats().catch(err => showToast(err.message, 'error'))" class="rounded-xl border border-pink-200 bg-white px-4 py-2 text-sm text-pink-600 hover:bg-pink-50 transition">
                <i class="ri-bar-chart-line mr-1"></i>刷新统计
            </button>
            <button type="button" onclick="loadFansPage().catch(err => showToast(err.message, 'error'))" class="rounded-xl border border-pink-200 bg-white px-4 py-2 text-sm text-pink-600 hover:bg-pink-50 transition">
                <i class="ri-refresh-line mr-1"></i>刷新粉丝
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="rounded-2xl border border-pink-100 bg-gradient-to-br from-pink-50 to-white p-4 shadow-sm">
            <p class="text-xs text-pink-500">操作总量（近30天）</p>
            <p id="op-total" class="mt-2 text-2xl font-bold text-pink-700">-</p>
        </div>
        <div class="rounded-2xl border border-pink-100 bg-white p-4 shadow-sm">
            <p class="text-xs text-gray-500">点赞操作数</p>
            <p id="op-like" class="mt-2 text-2xl font-bold text-gray-800">-</p>
        </div>
        <div class="rounded-2xl border border-pink-100 bg-white p-4 shadow-sm">
            <p class="text-xs text-gray-500">投币操作数</p>
            <p id="op-coin" class="mt-2 text-2xl font-bold text-gray-800">-</p>
        </div>
        <div class="rounded-2xl border border-pink-100 bg-white p-4 shadow-sm">
            <p class="text-xs text-gray-500">收藏操作数</p>
            <p id="op-favorite" class="mt-2 text-2xl font-bold text-gray-800">-</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="rounded-2xl border border-pink-100 bg-white shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b border-pink-100 font-semibold text-gray-800">1. 选择粉丝</div>
            <div id="fan-list" class="max-h-[520px] overflow-y-auto divide-y divide-gray-50">
                <div class="p-6 text-center text-gray-400">加载中...</div>
            </div>
            <div class="px-4 py-3 border-t border-pink-100 flex items-center justify-between text-sm">
                <button onclick="prevFanPage()" class="rounded-lg border border-pink-200 px-3 py-1.5 text-pink-600 hover:bg-pink-50">上一页</button>
                <span id="fan-page-indicator" class="text-gray-500">第 1 页</span>
                <button onclick="nextFanPage()" class="rounded-lg border border-pink-200 px-3 py-1.5 text-pink-600 hover:bg-pink-50">下一页</button>
            </div>
        </section>

        <section class="rounded-2xl border border-pink-100 bg-white shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b border-pink-100 font-semibold text-gray-800">2. 选择粉丝投稿</div>
            <div id="fan-video-list" class="max-h-[520px] overflow-y-auto divide-y divide-gray-50">
                <div class="p-6 text-center text-gray-400">请先选择粉丝</div>
            </div>
            <div class="px-4 py-3 border-t border-pink-100 flex items-center justify-between text-sm">
                <button onclick="prevVideoPage()" class="rounded-lg border border-pink-200 px-3 py-1.5 text-pink-600 hover:bg-pink-50">上一页</button>
                <span id="video-page-indicator" class="text-gray-500">第 1 页</span>
                <button onclick="nextVideoPage()" class="rounded-lg border border-pink-200 px-3 py-1.5 text-pink-600 hover:bg-pink-50">下一页</button>
            </div>
        </section>

        <section class="rounded-2xl border border-pink-100 bg-white shadow-sm p-5 space-y-4">
            <div class="font-semibold text-gray-800">3. 执行互动</div>
            <div id="selected-video-box" class="rounded-xl border border-pink-200 bg-pink-50/40 p-4 text-sm text-gray-500">请先选择投稿</div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="actLike()" class="rounded-lg bg-pink-100 text-pink-700 py-2 hover:bg-pink-200 transition">点赞</button>
                <button onclick="actCoin()" class="rounded-lg bg-rose-100 text-rose-700 py-2 hover:bg-rose-200 transition">投币</button>
                <button onclick="actFavorite()" class="rounded-lg bg-fuchsia-100 text-fuchsia-700 py-2 hover:bg-fuchsia-200 transition">收藏</button>
                <button onclick="actTriple()" class="rounded-lg bg-purple-100 text-purple-700 py-2 hover:bg-purple-200 transition">三连</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-3 text-xs text-gray-600">视频点赞：<span id="eng-like">-</span></div>
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-3 text-xs text-gray-600">视频投币：<span id="eng-coin">-</span></div>
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-3 text-xs text-gray-600">视频收藏：<span id="eng-fav">-</span></div>
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-3 text-xs text-gray-600">UP硬币：<span id="up-coin">-</span></div>
            </div>

            <div class="rounded-xl border border-gray-100 bg-gray-50 p-3 text-xs text-gray-600 space-y-1">
                <div>我的状态：<span id="my-like">-</span> / <span id="my-coin">-</span> / <span id="my-fav">-</span></div>
                <div>最近同步：<span id="sync-time">-</span></div>
            </div>
        </section>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
let fanItems = [];
let fanHasMore = false;
let fanPage = 1;
let fanPageSize = 20;
let videoItems = [];
let videoHasMore = false;
let videoPage = 1;
let videoPageSize = 10;
let selectedFan = null;
let selectedVideo = null;
let favoriteMediaID = 0;
let engagementPollTimer = null;

function fmt(n) {
    if (n == null) return '-';
    return Number(n).toLocaleString('zh-CN');
}

function renderFans() {
    const container = document.getElementById('fan-list');
    if (!fanItems.length) {
        container.innerHTML = '<div class="p-6 text-center text-gray-400">暂无粉丝投稿数据</div>';
        document.getElementById('fan-page-indicator').textContent = `第 ${fanPage} 页`;
        return;
    }
    container.innerHTML = fanItems.map(item => {
        const active = selectedFan && selectedFan.user_id === item.user_id;
        return `
            <button class="w-full text-left px-4 py-3 hover:bg-gray-50 ${active ? 'bg-pink-50' : ''}" onclick="selectFan(${item.user_id})">
                <div class="font-medium text-gray-800">${item.user_name || ('用户' + item.user_id)}</div>
                <div class="text-xs text-gray-500 mt-1">UID ${item.user_id}</div>
            </button>`;
    }).join('');
    document.getElementById('fan-page-indicator').textContent = `第 ${fanPage} 页`;
}

function renderFanVideos() {
    const container = document.getElementById('fan-video-list');
    if (!selectedFan) {
        container.innerHTML = '<div class="p-6 text-center text-gray-400">请先选择粉丝</div>';
        document.getElementById('video-page-indicator').textContent = `第 ${videoPage} 页`;
        return;
    }
    if (!videoItems.length) {
        container.innerHTML = '<div class="p-6 text-center text-gray-400">该粉丝暂无投稿</div>';
        document.getElementById('video-page-indicator').textContent = `第 ${videoPage} 页`;
        return;
    }
    container.innerHTML = videoItems.map(video => {
        const active = selectedVideo && selectedVideo.bvid === video.bvid;
        return `
            <button class="w-full text-left px-4 py-3 hover:bg-gray-50 ${active ? 'bg-blue-50' : ''}" onclick="selectVideo('${video.bvid}')">
                <div class="font-medium text-gray-800 truncate">${video.title || video.bvid}</div>
                <div class="text-xs text-gray-500 mt-1">${video.bvid} · 播放 ${fmt(video.view)}</div>
            </button>`;
    }).join('');
    document.getElementById('video-page-indicator').textContent = `第 ${videoPage} 页`;
}

function renderSelectedVideo() {
    const box = document.getElementById('selected-video-box');
    if (!selectedVideo) {
        box.innerHTML = '请先选择投稿';
        return;
    }
    box.innerHTML = `
        <div class="font-medium text-gray-800">${selectedVideo.title || selectedVideo.bvid}</div>
        <div class="mt-1 text-xs text-gray-500">${selectedVideo.bvid}</div>
    `;
}

function selectFan(fanID) {
    selectedFan = fanItems.find(item => item.user_id === fanID) || null;
    selectedVideo = null;
    videoItems = [];
    videoPage = 1;
    renderFans();
    renderFanVideos();
    renderSelectedVideo();
    if (selectedFan) {
        loadFanVideosPage().catch(err => showToast(err.message, 'error'));
    }
}

function selectVideo(bvid) {
    selectedVideo = videoItems.find(item => item.bvid === bvid) || null;
    renderFanVideos();
    renderSelectedVideo();
    refreshSelectedVideoEngagement();
}

function startEngagementPolling() {
    if (engagementPollTimer) {
        clearInterval(engagementPollTimer);
    }
    engagementPollTimer = setInterval(refreshSelectedVideoEngagement, 15 * 1000);
}

function refreshSelectedVideoEngagement() {
    if (!selectedVideo) {
        return;
    }
    syncEngagement().catch(err => showToast(err.message, 'error'));
}

async function loadInteractionDefaults() {
    const app = await api('/admin/api/settings/app');
    fanPageSize = Number(app.interaction?.fan_page_size || 20);
    videoPageSize = Number(app.interaction?.video_page_size || 10);
    favoriteMediaID = Number(app.interaction?.favorite_media_id || 0);
}

async function loadFansPage() {
    const data = await api(`/admin/api/fans/list?page=${fanPage}&page_size=${fanPageSize}`);
    fanItems = data.items || [];
    fanHasMore = !!data.has_more;
    selectedFan = null;
    selectedVideo = null;
    videoItems = [];
    renderFans();
    renderFanVideos();
    renderSelectedVideo();
}

async function loadFanVideosPage() {
    if (!selectedFan) return;
    const data = await api(`/admin/api/fans/${selectedFan.user_id}/videos?page=${videoPage}&page_size=${videoPageSize}`);
    videoItems = data.items || [];
    videoHasMore = !!data.has_more;
    selectedVideo = null;
    renderFanVideos();
    renderSelectedVideo();
}

function prevFanPage() {
    if (fanPage <= 1) return;
    fanPage -= 1;
    loadFansPage().catch(err => showToast(err.message, 'error'));
}

function nextFanPage() {
    if (!fanHasMore) return;
    fanPage += 1;
    loadFansPage().catch(err => showToast(err.message, 'error'));
}

function prevVideoPage() {
    if (!selectedFan || videoPage <= 1) return;
    videoPage -= 1;
    loadFanVideosPage().catch(err => showToast(err.message, 'error'));
}

function nextVideoPage() {
    if (!selectedFan || !videoHasMore) return;
    videoPage += 1;
    loadFanVideosPage().catch(err => showToast(err.message, 'error'));
}

async function loadOperationStats() {
    const data = await api('/admin/api/interactions/stats?days=30');
    const like = Number(data.like || 0);
    const coin = Number(data.coin || 0);
    const favorite = Number(data.favorite || 0);
    document.getElementById('op-like').textContent = fmt(like);
    document.getElementById('op-coin').textContent = fmt(coin);
    document.getElementById('op-favorite').textContent = fmt(favorite);
    document.getElementById('op-total').textContent = fmt(like + coin + favorite);
}

async function syncEngagement() {
    if (!selectedVideo) {
        showToast('请先选择投稿', 'error');
        return;
    }
    const data = await api(`/admin/api/videos/${selectedVideo.bvid}/engagement`);
    document.getElementById('eng-like').textContent = fmt(data.video?.like);
    document.getElementById('eng-coin').textContent = fmt(data.video?.coin);
    document.getElementById('eng-fav').textContent = fmt(data.video?.favorite);
    document.getElementById('up-coin').textContent = fmt(data.up_coin);
    document.getElementById('my-like').textContent = data.relation?.like ? '已点赞' : '未点赞';
    document.getElementById('my-coin').textContent = data.relation?.coined ? `已投币(${data.relation?.coin || 0})` : '未投币';
    document.getElementById('my-fav').textContent = data.relation?.favorite ? '已收藏' : '未收藏';
    document.getElementById('sync-time').textContent = data.synced_at ? new Date(data.synced_at).toLocaleString('zh-CN') : '-';
}

async function actLike() {
    if (!selectedVideo) return showToast('请先选择投稿', 'error');
    const data = await api(`/admin/api/videos/${selectedVideo.bvid}/like`, { method: 'POST' });
    showToast(data.message || '已执行点赞', data.success ? 'success' : 'error');
    await loadOperationStats();
    await syncEngagement();
}

async function actCoin() {
    if (!selectedVideo) return showToast('请先选择投稿', 'error');
    const data = await api(`/admin/api/videos/${selectedVideo.bvid}/coin`, {
        method: 'POST',
        body: { coin_count: 1 }
    });
    showToast(data.message || '已执行投币', data.success ? 'success' : 'error');
    await loadOperationStats();
    await syncEngagement();
}

async function actFavorite() {
    if (!selectedVideo) return showToast('请先选择投稿', 'error');
    if (!favoriteMediaID) return showToast('请先在系统设置中配置收藏夹ID', 'error');
    const data = await api(`/admin/api/videos/${selectedVideo.bvid}/favorite`, {
        method: 'POST',
        body: { media_id: favoriteMediaID }
    });
    showToast(data.message || '已执行收藏', data.success ? 'success' : 'error');
    await loadOperationStats();
    await syncEngagement();
}

async function actTriple() {
    if (!selectedVideo) return showToast('请先选择投稿', 'error');
    const data = await api(`/admin/api/videos/${selectedVideo.bvid}/triple`, { method: 'POST' });
    showToast(data.message || '已执行三连', data.success ? 'success' : 'error');
    await loadOperationStats();
    await syncEngagement();
}

document.addEventListener('DOMContentLoaded', () => {
    loadInteractionDefaults()
        .then(() => Promise.all([loadOperationStats(), loadFansPage()]))
        .catch(err => showToast(err.message, 'error'));
    startEngagementPolling();
    setInterval(() => {
        loadOperationStats().catch(err => showToast(err.message, 'error'));
    }, 60 * 1000);
});
</script>
{{ end }}
