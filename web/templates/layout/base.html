<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .sidebar-link.active {
            background-color: rgba(251, 191, 36, 0.1);
            border-left-color: #f59e0b;
            color: #f59e0b;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .gradient-amber {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
        }
        .gradient-pink {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        }
        .gradient-teal {
            background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
        }
    </style>
    {{ block "head" . }}{{ end }}
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-white shadow-lg flex-shrink-0">
            <div class="p-6">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl gradient-amber flex items-center justify-center">
                        <i class="ri-bilibili-fill text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-gray-800">B站运营助手</h1>
                        <p class="text-xs text-gray-500">UP主管理平台</p>
                    </div>
                </div>
            </div>
            
            <nav class="mt-2">
                <a href="/" class="sidebar-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 border-l-4 border-transparent {{ if eq .title "B站UP主运营管理平台" }}active{{ end }}">
                    <i class="ri-home-4-line w-5"></i>
                    <span class="ml-3">仪表盘</span>
                </a>
                <a href="/comments" class="sidebar-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 border-l-4 border-transparent {{ if eq .title "评论管理" }}active{{ end }}">
                    <i class="ri-chat-3-line w-5"></i>
                    <span class="ml-3">评论管理</span>
                </a>
                <a href="/messages" class="sidebar-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 border-l-4 border-transparent {{ if eq .title "私信管理" }}active{{ end }}">
                    <i class="ri-mail-line w-5"></i>
                    <span class="ml-3">私信管理</span>
                </a>
                <a href="/interaction" class="sidebar-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 border-l-4 border-transparent {{ if eq .title "互动管理" }}active{{ end }}">
                    <i class="ri-thumb-up-line w-5"></i>
                    <span class="ml-3">互动管理</span>
                </a>
                <a href="/trends" class="sidebar-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 border-l-4 border-transparent {{ if eq .title "热度分析" }}active{{ end }}">
                    <i class="ri-fire-line w-5"></i>
                    <span class="ml-3">热度分析</span>
                </a>
            </nav>
            
            <div class="absolute bottom-0 w-64 p-4">
                <div class="bg-gray-50 rounded-xl p-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center">
                            <i class="ri-user-line text-amber-600"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-800">UP主</p>
                            <p class="text-xs text-gray-500">已登录</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                {{ block "content" . }}{{ end }}
            </div>
        </main>
    </div>
    
    <script src="/static/js/app.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
