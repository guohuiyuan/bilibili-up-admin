<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{{ .title }}</title>
    <link rel="icon" type="image/png" href="/admin/static/img/logo.png">
    <link rel="shortcut icon" type="image/png" href="/admin/static/img/logo.png">
    <link rel="stylesheet" href="/admin/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* B站粉主题色激活状态 */
        .sidebar-link.active {
            background-color: rgba(251, 114, 153, 0.1); /* #FB7299 带有透明度 */
            border-left-color: #FB7299;
            color: #FB7299;
        }
        .sidebar-link:hover:not(.active) {
            color: #FB7299;
        }
    </style>
    {{ block "head" . }}{{ end }}
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex">
        <aside class="w-64 bg-white border-r border-gray-200 flex-shrink-0">
            <div class="p-6 border-b border-gray-100">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center text-white">
                        <i class="ri-bilibili-fill text-xl"></i>
                    </div>
                    <div>
                        <div class="font-semibold text-gray-800">B站运营后台</div>
                        <div class="text-xs text-gray-500">配置与互动管理</div>
                    </div>
                </div>
            </div>
            <nav class="py-4">
                <a href="/admin/" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "B站UP主运营管理平台" }}active{{ end }}">
                    <i class="ri-home-4-line"></i><span class="ml-3">首页</span>
                </a>
                <a href="/admin/comments" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "评论管理" }}active{{ end }}">
                    <i class="ri-chat-3-line"></i><span class="ml-3">评论</span>
                </a>
                <a href="/admin/messages" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "私信管理" }}active{{ end }}">
                    <i class="ri-mail-line"></i><span class="ml-3">私信</span>
                </a>
                <a href="/admin/interaction" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "互动管理" }}active{{ end }}">
                    <i class="ri-thumb-up-line"></i><span class="ml-3">互动</span>
                </a>
                <a href="/admin/trends" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "热度分析" }}active{{ end }}">
                    <i class="ri-fire-line"></i><span class="ml-3">热度</span>
                </a>
                <a href="/admin/settings" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "系统设置" }}active{{ end }}">
                    <i class="ri-settings-3-line"></i><span class="ml-3">系统设置</span>
                </a>
                <a href="/admin/settings/bilibili" class="sidebar-link flex items-center px-6 py-3 border-l-4 border-transparent hover:bg-gray-50 {{ if eq .title "B站配置" }}active{{ end }}">
                    <i class="ri-qr-code-line"></i><span class="ml-3">B站配置</span>
                </a>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                {{ block "content" . }}{{ end }}
            </div>
        </main>
    </div>
    <script src="/admin/static/js/app.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
