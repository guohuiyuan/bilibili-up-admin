{{ define "head" }}
<style>
:root {
    --panel-line: #e6ebf2;
    --panel-bg: #ffffff;
    --panel-accent: #fb7299;
}

.panel-shell {
    background:
        radial-gradient(circle at top left, rgba(251, 114, 153, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.1), transparent 24%),
        linear-gradient(180deg, #f8fafc 0%, #f3f6fb 100%);
}

.panel-card,
.panel-toolbar {
    background: var(--panel-bg);
    border: 1px solid var(--panel-line);
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.05);
}

.rank-item {
    transition: background-color 0.18s ease, border-color 0.18s ease;
}

.rank-item:hover {
    background: #fafcff;
}

.panel-scroll {
    height: 72vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(148, 153, 160, 0.45) transparent;
}

.panel-scroll::-webkit-scrollbar {
    width: 8px;
}

.panel-scroll::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(148, 153, 160, 0.35);
}
</style>
{{ end }}

{{ define "scripts" }}
<script>
function renderTagEmptyState(message) {
    const container = document.getElementById('tag-list');
    container.innerHTML = `
        <div class="p-10 text-center text-gray-400">
            <i class="ri-forbid-2-line text-4xl"></i>
            <p class="mt-2">${message}</p>
        </div>
    `;
}

function isUnsupportedTagError(message) {
    const text = String(message || '').toLowerCase();
    return text.includes('unsupported category') || text.includes('empty result');
}

async function loadTrendingTags() {
    const category = document.getElementById('tag-category-select').value || '';
    const query = new URLSearchParams();
    if (category) query.set('category', category);
    try {
        const data = await api(`/admin/api/trends/tags?${query.toString()}`);
        const tags = data.tags || [];
        if (!tags.length) {
            renderTagEmptyState('当前分类暂无标签热榜');
            return;
        }
        renderTags(tags);
    } catch (error) {
        if (isUnsupportedTagError(error.message)) {
            renderTagEmptyState('当前分类暂不支持标签热榜');
            showToast('当前分类暂不支持标签热榜', 'warning');
            return;
        }
        renderTagEmptyState('标签热榜加载失败');
        showToast(error.message, 'error');
    }
}

async function loadVideoRanking() {
    const category = document.getElementById('category-select').value;
    try {
        const data = await api(`/admin/api/trends/videos?category=${category}&limit=50`);
        renderVideos(data.videos || []);
    } catch (error) {
        showToast(error.message, 'error');
    }
}

function renderTags(tags) {
    const container = document.getElementById('tag-list');
    if (!tags.length) {
        renderTagEmptyState('没有匹配的标签结果');
        return;
    }
    container.innerHTML = tags.map((tag, index) => {
        const name = tag.name || tag.tag_name || tag.Name || tag.TagName || '';
        const useCount = tag.use_count ?? tag.useCount ?? tag.UseCount ?? 0;
        const followCount = tag.follow_count ?? tag.followCount ?? tag.FollowCount ?? 0;
        const category = tag.category || tag.Category || '';
        const videoCount = tag.video_count ?? tag.videoCount ?? tag.VideoCount ?? 0;
        const viewCount = tag.view_count ?? tag.viewCount ?? tag.ViewCount ?? 0;
        const showSearchMetrics = videoCount > 0 || viewCount > 0;
        return `
            <button onclick="showTagDetail('${name}')" class="rank-item w-full px-5 py-4 text-left">
                <div class="flex items-start gap-4">
                    <div class="flex h-10 w-10 items-center justify-center rounded-2xl ${index < 3 ? 'bg-pink-50 text-pink-600' : 'bg-gray-100 text-gray-500'} font-semibold">${index + 1}</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center justify-between gap-3">
                            <div class="truncate text-sm font-semibold text-gray-900">${name}</div>
                            <div class="text-xs text-gray-400">${category || (showSearchMetrics ? '搜索结果' : '全部')}</div>
                        </div>
                        <div class="mt-2 flex flex-wrap gap-3 text-xs text-gray-500">
                            ${showSearchMetrics ? `<span>视频 ${formatNumber(videoCount)}</span><span>播放 ${formatNumber(viewCount)}</span>` : `<span>使用 ${formatNumber(useCount)}</span><span>关注 ${formatNumber(followCount)}</span>`}
                        </div>
                    </div>
                </div>
            </button>
        `;
    }).join('');
}

function renderVideos(videos) {
    const container = document.getElementById('video-list');
    if (!videos.length) {
        container.innerHTML = `
            <div class="p-10 text-center text-gray-400">
                <i class="ri-video-line text-4xl"></i>
                <p class="mt-2">暂无视频排行数据</p>
            </div>
        `;
        return;
    }

    container.innerHTML = videos.map((video, index) => {
        const jumpUrl = video.bvid
            ? `https://www.bilibili.com/video/${video.bvid}`
            : (video.avid ? `https://www.bilibili.com/video/av${video.avid}` : '#');
        return `
            <div class="rank-item px-5 py-4">
                <div class="flex items-start gap-4">
                    <div class="flex h-10 w-10 items-center justify-center rounded-2xl ${index < 3 ? 'bg-pink-50 text-pink-600' : 'bg-gray-100 text-gray-500'} font-semibold">${index + 1}</div>
                    <div class="min-w-0 flex-1">
                        <a href="${jumpUrl}" target="_blank" rel="noopener noreferrer" class="line-clamp-2 text-sm font-semibold text-gray-900 hover:text-pink-500">${video.title || '-'}</a>
                        <div class="mt-2 flex flex-wrap gap-3 text-xs text-gray-500">
                            <span><i class="ri-user-3-line mr-1"></i>${video.owner || '-'}</span>
                            <span><i class="ri-play-line mr-1"></i>${formatNumber(video.view)}</span>
                            <span><i class="ri-thumb-up-line mr-1"></i>${formatNumber(video.like)}</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

async function showTagDetail(tagName) {
    document.getElementById('tag-name').textContent = `#${tagName}`;
    document.getElementById('tag-detail').classList.remove('hidden');
    try {
        const data = await api(`/admin/api/trends/tags/${encodeURIComponent(tagName)}?page=1&page_size=10`);
        const container = document.getElementById('tag-videos');
        const videos = data.top_videos || [];
        container.innerHTML = videos.map(video => `
            <div class="rounded-2xl border border-gray-200 bg-gray-50 p-4">
                <div class="text-sm font-medium text-gray-900">${video.title || '-'}</div>
                <div class="mt-2 flex flex-wrap gap-3 text-xs text-gray-500">
                    <span>${video.owner || '-'}</span>
                    <span><i class="ri-play-line mr-1"></i>${formatNumber(video.view)}</span>
                </div>
            </div>
        `).join('');
    } catch (error) {
        showToast(error.message, 'error');
    }
}

function closeTagDetail() {
    document.getElementById('tag-detail').classList.add('hidden');
}

async function searchTag() {
    const keyword = document.getElementById('search-keyword').value.trim();
    if (!keyword) {
        loadTrendingTags();
        return;
    }
    try {
        const data = await api(`/admin/api/trends/search?keyword=${encodeURIComponent(keyword)}&page=1&page_size=20`);
        renderTags(data.tags || []);
    } catch (error) {
        showToast(error.message, 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('search-keyword').addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            event.preventDefault();
            searchTag();
        }
    });
    loadTrendingTags();
    loadVideoRanking();
    setInterval(() => {
        loadTrendingTags();
        loadVideoRanking();
    }, 60 * 1000);
});
</script>
{{ end }}
