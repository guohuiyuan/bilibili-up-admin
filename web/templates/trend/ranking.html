{{ define "head" }}
<style>
.tag-item {
    transition: all 0.2s ease;
}

    background-color: #fef3c7;

{{ define "content" }}
<div class="mb-8">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">热度分析</h2>
            <p class="text-gray-500 mt-1">查看B站热门标签和视频排行（后台轮询自动更新）</p>
        </div>
    </div>
</div>

<!-- 搜索 -->
<div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
    <div class="flex space-x-4">
        <div class="flex-1">
            <input type="text" id="search-keyword" placeholder="搜索标签..."
                   class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500">
        </div>
        <button onclick="searchTag()" class="px-6 py-2 bg-pink-500 text-white rounded-xl hover:bg-pink-600 transition">
            搜索
        </button>
    </div>
</div>

                <select id="tag-category-select" onchange="loadTrendingTags()" class="px-3 py-1 border border-gray-200 rounded-lg text-sm">

                    <option value="Bangumi">番剧</option>
                    <option value="GuochuangAnime">国产动画</option>
                    <option value="Guochuang">国创相关</option>
                    <option value="Documentary">纪录片</option>
                    <option value="Douga">动画</option>
                    <option value="Music">音乐</option>
                    <option value="Dance">舞蹈</option>
                    <option value="Game">游戏</option>
                    <option value="Knowledge">知识</option>
                    <option value="Technology">科技数码</option>
                    <option value="Sports">运动</option>
                    <option value="Car">汽车</option>
                    <option value="Life">生活</option>
                    <option value="Food">美食</option>
                    <option value="Animal">动物圈</option>
                    <option value="Kichiku">鬼畜</option>
                    <option value="Fashion">时尚美妆</option>
                    <option value="Ent">娱乐</option>

        </div>
    </div>

    <!-- 视频排行 -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h3 class="font-semibold text-gray-800 flex items-center">
                    <i class="ri-trophy-line text-pink-500 mr-2"></i>
                    视频排行
                </h3>
                <select id="category-select" onchange="loadVideoRanking()" class="px-3 py-1 border border-gray-200 rounded-lg text-sm">
                    <option value="All">全部</option>
                    <option value="Guochuang">国创相关</option>
                    <option value="Documentary">纪录片</option>
                    <option value="Douga">动画</option>
                    <option value="Music">音乐</option>
                    <option value="Dance">舞蹈</option>
                    <option value="Game">游戏</option>
                    <option value="Knowledge">知识</option>
                    <option value="Technology">科技数码</option>
                    <option value="Sports">运动</option>
                    <option value="Car">汽车</option>
                    <option value="Life">生活</option>
                    <option value="Food">美食</option>
                    <option value="Animal">动物圈</option>
                    <option value="Kichiku">鬼畜</option>
                    <option value="Fashion">时尚美妆</option>
                    <option value="Ent">娱乐</option>
                    <option value="Cinephile">影视</option>
                    <option value="Movie">电影</option>
                    <option value="TV">电视剧</option>
                    <option value="Original">原创</option>
                    <option value="Rookie">新人</option>
                </select>
            </div>
        </div>
        <div id="video-list" class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
            <div class="p-8 text-center text-gray-400">
                <i class="ri-loader-4-line animate-spin text-4xl"></i>
                <p class="mt-2">加载中...</p>
            </div>
        </div>

</div>

<!-- 标签详情 -->
<div id="tag-detail" class="bg-white rounded-2xl p-6 shadow-sm hidden">
    <div class="flex items-center justify-between mb-4">
        <h3 id="tag-name" class="font-semibold text-gray-800 text-lg"></h3>
        <button onclick="closeTagDetail()" class="text-gray-400 hover:text-gray-600">
            <i class="ri-close-line text-xl"></i>
        </button>
    </div>
    <div id="tag-videos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
const TREND_CATEGORY_ALIAS_TO_LABEL = {
    All: '',
    Bangumi: '番剧',
    GuochuangAnime: '国创',
    Guochuang: '国创',
    Documentary: '影视',
    Douga: '动画',
    Music: '音乐',
    Dance: '舞蹈',
    Game: '游戏',
    Knowledge: '知识',
    Technology: '科技',
    Sports: '运动',
    Car: '汽车',
    Life: '生活',
    Food: '美食',
    Animal: '动物圈',
    Kichiku: '鬼畜',
    Fashion: '时尚',
    Ent: '娱乐',
    Cinephile: '影视',
    Movie: '影视',
    TV: '影视',
    Variety: '影视',
};

function toTrendCategoryLabel(category) {
    return TREND_CATEGORY_ALIAS_TO_LABEL[category] ?? category;
}

async function loadTrendingTags() {
    const category = document.getElementById('tag-category-select')?.value || '';
    const query = new URLSearchParams();
    if (category) {
        query.set('category', category);
    }
    try {
        const response = await fetch(`/admin/api/trends/tags?${query.toString()}`);
        if (!response.ok) {
            const errBody = await response.json().catch(() => ({}));
            throw new Error(errBody.error || '获取热门标签失败');
        }
        const data = await response.json();
        const tags = data.tags || [];
        if (tags.length > 0) {
            renderTags(tags);
            return;
        }
        await loadLatestRankingsAsTags(category);
    } catch (error) {
        try {
            await loadLatestRankingsAsTags(category);
        } catch (fallbackError) {
            showToast('加载失败: ' + error.message, 'error');
        }
    }
}

async function loadLatestRankingsAsTags(category) {
    const normalizedCategory = toTrendCategoryLabel(category);
    const query = new URLSearchParams();
    if (normalizedCategory) {
        query.set('category', normalizedCategory);
    }
    const response = await fetch(`/admin/api/trends/latest?${query.toString()}`);
    if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(errBody.error || '获取历史热度失败');
    }
    const data = await response.json();
    let rankings = data.rankings || [];
    if (normalizedCategory) {
        rankings = rankings.filter(item => {
            const itemCategory = item.category || '';
            return itemCategory === normalizedCategory || itemCategory === category;
        });
    }
    const tags = rankings.map((item, index) => ({
        name: item.tag_name || item.name || '',
        hot_value: item.hot_value || 0,
        rank: item.rank || index + 1,
        category: item.category || '',
        use_count: item.video_count || 0,
        follow_count: 0,
    }));
    renderTags(tags);
}

async function loadVideoRanking() {
    const category = document.getElementById('category-select').value;
    try {
        const response = await fetch(`/admin/api/trends/videos?category=${category}&limit=50`);
        if (!response.ok) {
            const errBody = await response.json().catch(() => ({}));
            throw new Error(errBody.error || '获取视频排行失败');
        }
        const data = await response.json();
        renderVideos(data.videos || []);
    } catch (error) {
        showToast('加载失败: ' + error.message, 'error');
    }
}

function renderTags(tags) {
    const container = document.getElementById('tag-list');

    if (tags.length === 0) {
        container.innerHTML = `
            <div class="p-8 text-center text-gray-400">
                <i class="ri-tag-line text-4xl"></i>
                <p class="mt-2">暂无数据</p>
            </div>
        `;
        return;
    }

    container.innerHTML = tags.map((tag, index) => {
        const name = tag.name || tag.tag_name || tag.Name || tag.TagName || '';
        const useCount = tag.use_count ?? tag.useCount ?? tag.UseCount ?? 0;
        const followCount = tag.follow_count ?? tag.followCount ?? tag.FollowCount ?? 0;
        const category = tag.category || tag.Category || '';
        return `
        <div class="tag-item flex items-center justify-between p-4 cursor-pointer rounded-xl mx-2 my-1 border border-transparent hover:border-amber-200" onclick="showTagDetail('${name}')">
            <div class="flex items-center space-x-3">
                <span class="w-8 h-8 rounded-lg ${
                    index < 3 ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'
                } flex items-center justify-center font-bold text-sm">
                    ${index + 1}
                </span>
                <div>
                    <span class="text-gray-800 font-medium">${name}</span>
                    <div class="text-xs text-gray-400 mt-1">使用 ${formatNumber(useCount)} · 关注 ${formatNumber(followCount)}${category ? ` · ${category}` : ''}</div>
                </div>
            </div>
        </div>
    `}).join('');
}

function renderVideos(videos) {
    const container = document.getElementById('video-list');

    if (videos.length === 0) {
        container.innerHTML = `
            <div class="p-8 text-center text-gray-400">
                <i class="ri-video-line text-4xl"></i>
                <p class="mt-2">暂无数据</p>
            </div>
        `;
        return;
    }

    container.innerHTML = videos.map((video, index) => {
        const jumpUrl = video.bvid
            ? `https://www.bilibili.com/video/${video.bvid}`
            : (video.avid ? `https://www.bilibili.com/video/av${video.avid}` : '#');
        return `
        <div class="flex items-start space-x-3 p-4 hover:bg-gray-50 transition rounded-xl mx-2 my-1 border border-transparent hover:border-pink-100">
            <span class="w-8 h-8 rounded-lg ${
                index < 3 ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'
            } flex items-center justify-center font-bold text-sm flex-shrink-0">
                ${index + 1}
            </span>
            <div class="flex-1 min-w-0">
                <a href="${jumpUrl}" target="_blank" rel="noopener noreferrer" class="text-gray-800 hover:text-pink-600 font-medium line-clamp-2 break-words">${video.title}</a>
                <div class="flex items-center flex-wrap gap-x-3 gap-y-1 mt-2 text-xs text-gray-500">
                    <span class="inline-flex items-center"><i class="ri-user-3-line mr-1"></i>${video.owner || '-'}</span>
                    <span><i class="ri-play-line"></i> ${formatNumber(video.view)}</span>
                    <span><i class="ri-thumb-up-line"></i> ${formatNumber(video.like)}</span>
                </div>
            </div>
        </div>
    `}).join('');
}

async function showTagDetail(tagName) {
    document.getElementById('tag-name').textContent = `#${tagName}`;
    document.getElementById('tag-detail').classList.remove('hidden');

    try {
        const response = await fetch(`/admin/api/trends/tags/${encodeURIComponent(tagName)}?page=1&page_size=10`);
        if (!response.ok) {
            const errBody = await response.json().catch(() => ({}));
            throw new Error(errBody.error || '获取标签详情失败');
        }
        const data = await response.json();

        const container = document.getElementById('tag-videos');
        container.innerHTML = (data.top_videos || []).map(video => `
            <div class="bg-gray-50 rounded-xl p-4">
                <p class="text-gray-800 text-sm truncate">${video.title}</p>
                <div class="flex items-center space-x-3 mt-2 text-xs text-gray-500">
                    <span>${video.owner}</span>
                    <span><i class="ri-play-line"></i> ${formatNumber(video.view)}</span>
                </div>
            </div>
        `).join('');
    } catch (error) {
        showToast('加载详情失败: ' + error.message, 'error');
    }
}

function closeTagDetail() {
    document.getElementById('tag-detail').classList.add('hidden');
}

async function searchTag() {
    const keyword = document.getElementById('search-keyword').value;
    if (!keyword) return;

    try {
        const response = await fetch(`/admin/api/trends/search?keyword=${encodeURIComponent(keyword)}`);
        if (!response.ok) {
            const errBody = await response.json().catch(() => ({}));
            throw new Error(errBody.error || '搜索标签失败');
        }
        const data = await response.json();
        renderTags(data.tags || []);
    } catch (error) {
        showToast('搜索失败: ' + error.message, 'error');
    }
}

function formatNumber(num) {
    if (!num) return '0';
    if (num >= 10000) {
        return (num / 10000).toFixed(1) + '万';
    }
    return num.toString();
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${
        type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
    }`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

loadTrendingTags();
loadVideoRanking();
setInterval(() => {
    loadTrendingTags();
    loadVideoRanking();
}, 2 * 60 * 1000);
</script>
{{ end }}
