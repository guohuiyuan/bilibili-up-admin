{{ define "content" }}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="ri-lock-password-line text-pink-500 mr-2"></i>修改密码
        </h2>
        <p class="text-sm text-gray-500 mt-1">首次默认密码登录后必须修改；后续可随时在本页更新密码。</p>
    </div>

    <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
        <form id="password-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">当前密码（首次修改可留空）</label>
                <input id="current-password" type="password" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">新密码</label>
                <input id="new-password" type="password" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" minlength="8" required>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">确认新密码</label>
                <input id="confirm-password" type="password" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" minlength="8" required>
            </div>
            <button type="submit" class="w-full md:w-auto px-6 py-2.5 bg-pink-500 hover:bg-pink-600 text-white rounded-xl transition font-medium">保存密码</button>
        </form>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
document.getElementById('password-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const currentPassword = document.getElementById('current-password').value;
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (newPassword.length < 8) {
        showToast('新密码至少 8 位', 'error');
        return;
    }
    if (newPassword !== confirmPassword) {
        showToast('两次输入的新密码不一致', 'error');
        return;
    }

    try {
        await api('/admin/api/auth/change-password', {
            method: 'POST',
            body: {
                current_password: currentPassword,
                new_password: newPassword,
            }
        });
        showToast('密码修改成功', 'success');
        setTimeout(() => {
            window.location.href = '/admin/';
        }, 600);
    } catch (error) {
        showToast(error.message || '修改失败', 'error');
    }
});
</script>
{{ end }}
