{{ define "content" }}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
        <div class="inline-flex w-14 h-14 rounded-2xl gradient-primary items-center justify-center text-white mb-3 overflow-hidden">
            <img src="/admin/static/img/logo.png" alt="logo" class="w-10 h-10 object-contain">
        </div>
        <h2 class="text-2xl font-bold text-gray-800">管理员登录</h2>
        <p class="text-sm text-gray-500 mt-1">首次登录请使用默认账号并立即修改密码</p>
    </div>

    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-600 mb-1">账号</label>
            <input id="username" type="text" value="admin" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
        </div>
        <div>
            <label class="block text-sm text-gray-600 mb-1">密码</label>
            <input id="password" type="password" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
        </div>
        <button type="submit" class="w-full py-2.5 bg-pink-500 hover:bg-pink-600 text-white rounded-xl transition font-medium">登录</button>
    </form>

    <div class="mt-5 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-lg p-3">
        默认账号：admin；默认密码：admin123456
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
document.getElementById('login-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    try {
        const data = await api('/admin/api/auth/login', {
            method: 'POST',
            body: { username, password }
        });
        if (data.must_change_password) {
            window.location.href = '/admin/account/password';
            return;
        }
        window.location.href = '/admin/';
    } catch (error) {
        showToast(error.message || '登录失败', 'error');
    }
});
</script>
{{ end }}
