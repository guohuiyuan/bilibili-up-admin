{{ define "content" }}
<div class="max-w-6xl mx-auto space-y-6">
    <div>
        <h2 class="text-2xl font-bold text-gray-800">系统设置</h2>
        <p class="mt-1 text-sm text-gray-500">管理全局基础配置和所有的大模型通道，更改后即时生效。</p>
    </div>

    <section class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm space-y-6">
        <div class="flex items-center justify-between border-b border-gray-100 pb-4">
            <h3 class="text-lg font-semibold text-gray-800">常规设置</h3>
            <button type="button" onclick="saveGeneralSettings().catch(err => showToast(err.message, 'error'))" class="rounded-xl bg-pink-500 px-5 py-2 text-white hover:bg-pink-600 transition shadow-sm">
                <i class="ri-save-line mr-1"></i>保存常规设置
            </button>
        </div>

        <div>
            <label class="mb-2 block text-sm font-medium text-gray-700">默认调用模型 (Default Provider)</label>
            <select id="default-provider" class="w-full rounded-xl border border-gray-200 px-4 py-3 bg-white focus:ring-2 focus:ring-pink-400 outline-none"></select>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">Worker 数量</label>
                <input id="worker-count" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none">
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">队列容量</label>
                <input id="queue-size" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none">
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">日志级别</label>
                <input id="log-level" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="debug / info / warn / error">
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">日志格式</label>
                <input id="log-format" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="console / json">
            </div>
            <div class="md:col-span-2">
                <label class="mb-2 block text-sm font-medium text-gray-700">日志文件路径</label>
                <input id="log-file-path" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="logs/bilibili-up-admin.log">
            </div>
        </div>

        <div class="rounded-xl border border-pink-100 bg-pink-50/40 p-4">
            <h4 class="text-sm font-semibold text-pink-700 mb-3">互动规则设置</h4>
            <div class="grid gap-4 md:grid-cols-2">
                <label class="flex items-center space-x-2 text-sm text-gray-700">
                    <input id="interaction-enable-like" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-pink-500 focus:ring-pink-500">
                    <span>启用自动点赞</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-gray-700">
                    <input id="interaction-enable-coin" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-pink-500 focus:ring-pink-500">
                    <span>启用自动投币</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-gray-700 md:col-span-2">
                    <input id="interaction-enable-favorite" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-pink-500 focus:ring-pink-500">
                    <span>启用自动收藏</span>
                </label>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">投币播放阈值</label>
                    <input id="interaction-coin-threshold" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="10000">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">收藏夹 ID (media_id)</label>
                    <input id="interaction-favorite-media-id" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="自动收藏时必填">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">粉丝分页大小</label>
                    <input id="interaction-fan-page-size" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="20">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">投稿分页大小</label>
                    <input id="interaction-video-page-size" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="5">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">请求间隔（秒）</label>
                    <input id="interaction-request-interval" type="number" class="w-full rounded-xl border border-gray-200 px-4 py-3 focus:ring-2 focus:ring-pink-400 outline-none" placeholder="3">
                </div>
            </div>
        </div>
    </section>

    <section class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm space-y-6">
        <div class="flex items-center justify-between border-b border-gray-100 pb-4">
            <h3 class="text-lg font-semibold text-gray-800">大模型管理 (Providers)</h3>
            <button type="button" onclick="Modal.show('add-provider-modal')" class="rounded-xl bg-blue-500 px-4 py-2 text-white hover:bg-blue-600 transition shadow-sm">
                <i class="ri-add-line mr-1"></i>添加模型
            </button>
        </div>
        <div id="providers" class="space-y-4">
            <div class="text-center text-gray-400 py-8"><i class="ri-loader-4-line animate-spin text-2xl"></i><p>加载中...</p></div>
        </div>
    </section>

    <section class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm space-y-4">
        <div class="flex items-center justify-between border-b border-gray-100 pb-4">
            <div>
                <h3 class="text-lg font-semibold text-gray-800">轮询可观测性</h3>
                <p class="mt-1 text-xs text-gray-500">展示标签、评论、私信轮询任务的运行状态与统计信息。</p>
            </div>
            <div class="flex items-center space-x-2">
                <span id="polling-overview" class="text-xs text-gray-500">加载中...</span>
                <button type="button" onclick="loadPollingStats().catch(err => showToast(err.message, 'error'))" class="rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-sm text-gray-700 hover:border-pink-300 hover:text-pink-500 transition">
                    <i class="ri-refresh-line mr-1"></i>刷新
                </button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead>
                    <tr class="text-left text-xs text-gray-500 border-b border-gray-100">
                        <th class="py-2 pr-4">任务</th>
                        <th class="py-2 pr-4">状态</th>
                        <th class="py-2 pr-4">成功/失败/跳过</th>
                        <th class="py-2 pr-4">最近耗时</th>
                        <th class="py-2 pr-4">最近执行</th>
                        <th class="py-2 pr-4">下次执行</th>
                        <th class="py-2 pr-4">最近错误</th>
                    </tr>
                </thead>
                <tbody id="polling-stats-body">
                    <tr><td colspan="7" class="py-6 text-center text-gray-400">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<div id="add-provider-modal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl w-[400px] p-6 shadow-xl transform transition-all">
        <h3 class="text-lg font-bold mb-4 text-gray-800 flex items-center"><i class="ri-robot-line text-pink-500 mr-2"></i>添加模型渠道</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-gray-700">配置名称 (唯一标识，如 my-openai)</label>
                <input id="new-provider-name" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-pink-400 outline-none">
            </div>
            <div>
                <label class="block text-sm mb-1 text-gray-700">模型渠道 (Channel - 由后端动态拉取)</label>
                <select id="new-provider-channel" class="w-full border border-gray-200 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-pink-400 outline-none">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        <div class="mt-6 flex justify-end space-x-3">
            <button onclick="Modal.hide('add-provider-modal')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
            <button onclick="submitNewProvider()" class="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition shadow-sm">确定添加</button>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
let availableChannels = [];
let currentProviders = {};
let pollingStatsTimer = null;

// 动态兼容有无 /admin 前缀
function getApiPrefix() {
    return window.location.pathname.startsWith('/admin') ? '/admin' : '';
}

// 1. 从后端获取允许的底层渠道列表 (GET)
async function loadChannels() {
    try {
        availableChannels = await api(`${getApiPrefix()}/api/settings/llm/channels`);
        const select = document.getElementById("new-provider-channel");
        select.innerHTML = availableChannels.map(ch => `<option value="${ch}">${ch}</option>`).join('');
    } catch (err) {
        console.error("加载渠道失败", err);
    }
}

// 2. 加载整个页面的数据
async function loadData() {
    try {
        // 加载常规配置
        const appData = await api(`${getApiPrefix()}/api/settings/app`);
        document.getElementById("worker-count").value = appData.task?.worker_count || 5;
        document.getElementById("queue-size").value = appData.task?.queue_size || 100;
        document.getElementById("log-level").value = appData.log?.level || "debug";
        document.getElementById("log-format").value = appData.log?.format || "console";
        document.getElementById("log-file-path").value = appData.log?.file_path || "";
        document.getElementById("interaction-enable-like").checked = appData.interaction?.enable_like ?? true;
        document.getElementById("interaction-enable-coin").checked = appData.interaction?.enable_coin ?? true;
        document.getElementById("interaction-enable-favorite").checked = appData.interaction?.enable_favorite ?? false;
        document.getElementById("interaction-coin-threshold").value = appData.interaction?.coin_play_threshold || 10000;
        document.getElementById("interaction-favorite-media-id").value = appData.interaction?.favorite_media_id || 0;
        document.getElementById("interaction-fan-page-size").value = appData.interaction?.fan_page_size || 20;
        document.getElementById("interaction-video-page-size").value = appData.interaction?.video_page_size || 5;
        document.getElementById("interaction-request-interval").value = appData.interaction?.request_interval_seconds || 3;

        // 加载独立拉取的模型列表
        const providers = await api(`${getApiPrefix()}/api/settings/llm/providers`);
        currentProviders = providers || {};
        renderProviders();

        // 刷新默认模型下拉菜单
        const defaultSelect = document.getElementById("default-provider");
        const currentDefault = appData.llm?.default_provider || "";
        defaultSelect.innerHTML = Object.keys(currentProviders).map(name =>
            `<option value="${name}" ${name === currentDefault ? "selected" : ""}>${name}</option>`
        ).join('') + `<option value="" ${currentDefault === "" ? "selected" : ""}>不设置 (关闭AI)</option>`;
    } catch(err) {
        showToast('加载失败: ' + err.message, 'error');
    }
}

function formatDateTime(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return '-';
    return d.toLocaleString();
}

function escapeHtml(value) {
    const text = value == null ? '' : String(value);
    return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function renderPollingStats(data) {
    const body = document.getElementById('polling-stats-body');
    const overview = document.getElementById('polling-overview');
    const tasks = data?.tasks || [];
    overview.textContent = `状态: ${data?.started ? '运行中' : '未启动'} · 任务数: ${tasks.length}`;

    if (tasks.length === 0) {
        body.innerHTML = `<tr><td colspan="7" class="py-6 text-center text-gray-400">暂无轮询任务</td></tr>`;
        return;
    }

    body.innerHTML = tasks.map(task => {
        const statusText = task.running ? '运行中' : '空闲';
        const statusClass = task.running ? 'text-emerald-600 bg-emerald-50 border-emerald-200' : 'text-gray-600 bg-gray-50 border-gray-200';
        const hasFailure = (task.failure_count || 0) > 0;
        const rowClass = hasFailure ? 'bg-red-50/60 border-red-100' : 'border-gray-50';
        const lastError = (task.last_error || '').trim();
        const errorCell = lastError
            ? `<details class="group max-w-xl">
                    <summary class="cursor-pointer text-red-500 hover:text-red-600 list-none">
                        <span class="inline-flex items-center text-xs"><i class="ri-alert-line mr-1"></i>展开错误详情</span>
                    </summary>
                    <pre class="mt-2 max-h-28 overflow-auto whitespace-pre-wrap rounded-md border border-red-100 bg-red-50 p-2 text-xs text-red-600">${escapeHtml(lastError)}</pre>
               </details>`
            : '-';
        return `
            <tr class="border-b align-top ${rowClass}">
                <td class="py-3 pr-4">
                    <div class="font-medium text-gray-800">${task.name || '-'}</div>
                    <div class="text-xs text-gray-400">间隔 ${task.interval_second || 0}s · 超时 ${task.timeout_second || 0}s</div>
                </td>
                <td class="py-3 pr-4">
                    <span class="inline-flex items-center rounded-md border px-2 py-0.5 text-xs ${statusClass}">${statusText}</span>
                </td>
                <td class="py-3 pr-4 text-gray-700">${task.success_count || 0} / ${task.failure_count || 0} / ${task.skip_count || 0}</td>
                <td class="py-3 pr-4 text-gray-700">${task.last_duration_ms || 0} ms</td>
                <td class="py-3 pr-4 text-gray-500">${formatDateTime(task.last_finished_at)}</td>
                <td class="py-3 pr-4 text-gray-500">${formatDateTime(task.next_run_at)}</td>
                <td class="py-3 pr-4 text-xs text-red-500 break-all">${errorCell}</td>
            </tr>`;
    }).join('');
}

async function loadPollingStats() {
    const data = await api(`${getApiPrefix()}/api/observability/polling`);
    renderPollingStats(data);
}

// 渲染大模型列表卡片
function renderProviders() {
    const container = document.getElementById("providers");
    const entries = Object.entries(currentProviders);

    if (entries.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-400 py-8">暂无配置的大模型</div>`;
        return;
    }

    container.innerHTML = entries.map(([name, config]) => `
    <div class="rounded-2xl border border-gray-200 bg-gray-50 p-5 hover:border-pink-200 transition" data-provider="${name}">
        <div class="mb-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="font-bold text-gray-800 text-lg">${name}</span>
                <span class="text-xs font-normal text-blue-600 bg-blue-100 px-2 py-0.5 rounded-md border border-blue-200">${config.provider}</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="updateProvider('${name}')" class="rounded-lg bg-white border border-gray-200 px-3 py-1 text-sm text-gray-700 hover:text-pink-500 hover:border-pink-300 transition shadow-sm"><i class="ri-save-line mr-1"></i>保存此模型</button>
                <button onclick="deleteProvider('${name}')" class="rounded-lg bg-white border border-red-100 px-3 py-1 text-sm text-red-500 hover:bg-red-50 transition shadow-sm"><i class="ri-delete-bin-line mr-1"></i>删除</button>
            </div>
        </div>
        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label class="mb-1 block text-xs font-medium text-gray-600">具体的模型类型 (Model)</label>
                <input class="provider-model w-full rounded-lg border border-gray-200 px-3 py-2 outline-none focus:border-pink-400" value="${config.model || ""}" placeholder="例如 gpt-4o 或 deepseek-chat">
            </div>
            <div>
                <label class="mb-1 block text-xs font-medium text-gray-600">中转代理 URL (可选)</label>
                <input class="provider-base-url w-full rounded-lg border border-gray-200 px-3 py-2 outline-none focus:border-pink-400" value="${config.base_url || ""}" placeholder="不填则使用官方默认地址">
            </div>
            <div class="md:col-span-2">
                <label class="mb-1 block text-xs font-medium text-gray-600">API Key</label>
                <input class="provider-api-key w-full rounded-lg border border-gray-200 px-3 py-2 outline-none focus:border-pink-400" type="password" value="${config.api_key || ""}" placeholder="sk-...">
            </div>
            <div class="grid grid-cols-3 gap-3 md:col-span-2">
                <div class="flex flex-col justify-center">
                    <label class="flex items-center space-x-2 cursor-pointer mt-4">
                        <input class="provider-enabled w-4 h-4 text-pink-500 border-gray-300 rounded focus:ring-pink-500" type="checkbox" ${config.enabled ? "checked" : ""}>
                        <span class="text-sm font-medium text-gray-700">启用该模型</span>
                    </label>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-gray-600">Max Tokens</label>
                    <input class="provider-max-tokens w-full rounded-lg border border-gray-200 px-3 py-2 outline-none focus:border-pink-400" type="number" value="${config.max_tokens || 1000}">
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-gray-600">Temperature</label>
                    <input class="provider-temperature w-full rounded-lg border border-gray-200 px-3 py-2 outline-none focus:border-pink-400" type="number" step="0.1" value="${config.temperature ?? 0.7}">
                </div>
            </div>
        </div>
    </div>`).join("");
}

// 3. 独立提交添加 (POST)
async function submitNewProvider() {
    const name = document.getElementById("new-provider-name").value.trim();
    const channel = document.getElementById("new-provider-channel").value;

    if (!name) return showToast("请输入配置名称", "warning");
    if (currentProviders[name]) return showToast("名称已存在", "warning");
    if (!channel) return showToast("请选择渠道", "warning");

    try {
        await api(`${getApiPrefix()}/api/settings/llm/providers`, {
            method: 'POST',
            body: {
                name: name,
                settings: {
                    enabled: true,
                    provider: channel,
                    model: "",
                    base_url: "",
                    api_key: "",
                    max_tokens: 1000,
                    temperature: 0.7
                }
            }
        });
        showToast("添加成功，请在下方补充参数", "success");
        Modal.hide('add-provider-modal');
        document.getElementById("new-provider-name").value = "";
        await loadData();
    } catch (err) {
        showToast("添加失败: " + err.message, "error");
    }
}

// 4. 独立更新模型 (PUT)
async function updateProvider(name) {
    const card = document.querySelector(`[data-provider="${name}"]`);
    if (!card) return;

    const settings = {
        provider: currentProviders[name].provider, // 渠道类型不能改
        model: card.querySelector(".provider-model").value.trim(),
        base_url: card.querySelector(".provider-base-url").value.trim(),
        api_key: card.querySelector(".provider-api-key").value.trim(),
        enabled: card.querySelector(".provider-enabled").checked,
        max_tokens: Number(card.querySelector(".provider-max-tokens").value || 1000),
        temperature: Number(card.querySelector(".provider-temperature").value || 0.7)
    };

    try {
        await api(`${getApiPrefix()}/api/settings/llm/providers/${encodeURIComponent(name)}`, {
            method: 'PUT',
            body: settings
        });
        showToast("模型配置保存成功", "success");
        await loadData();
    } catch (err) {
        showToast("保存失败: " + err.message, "error");
    }
}

// 5. 独立删除模型 (DELETE)
async function deleteProvider(name) {
    if (!confirm(`确定要彻底删除配置 [${name}] 吗？`)) return;

    try {
        await api(`${getApiPrefix()}/api/settings/llm/providers/${encodeURIComponent(name)}`, {
            method: 'DELETE'
        });
        showToast("已删除该配置", "success");
        await loadData();
    } catch (err) {
        showToast("删除失败: " + err.message, "error");
    }
}

// 6. 保存其它杂项设置 (常规配置)
async function saveGeneralSettings() {
    try {
        // 先获取最新避免覆盖，再组合提交 (由于后端需要完整对象)
        const appData = await api(`${getApiPrefix()}/api/settings/app`);
        appData.llm.default_provider = document.getElementById("default-provider").value.trim();
        appData.task.worker_count = Number(document.getElementById("worker-count").value || 5);
        appData.task.queue_size = Number(document.getElementById("queue-size").value || 100);
        appData.log.level = document.getElementById("log-level").value.trim();
        appData.log.format = document.getElementById("log-format").value.trim();
        appData.log.file_path = document.getElementById("log-file-path").value.trim();
        appData.interaction = {
            enable_like: document.getElementById("interaction-enable-like").checked,
            enable_coin: document.getElementById("interaction-enable-coin").checked,
            enable_favorite: document.getElementById("interaction-enable-favorite").checked,
            coin_play_threshold: Number(document.getElementById("interaction-coin-threshold").value || 10000),
            favorite_media_id: Number(document.getElementById("interaction-favorite-media-id").value || 0),
            fan_page_size: Number(document.getElementById("interaction-fan-page-size").value || 20),
            video_page_size: Number(document.getElementById("interaction-video-page-size").value || 5),
            request_interval_seconds: Number(document.getElementById("interaction-request-interval").value || 3)
        };

        await api(`${getApiPrefix()}/api/settings/app`, {
            method: "PUT",
            body: {
                llm: appData.llm,
                llm_providers: currentProviders, // 保持现状
                task: appData.task,
                log: appData.log,
                interaction: appData.interaction
            }
        });

        showToast("常规设置已保存", "success");
    } catch (err) {
        showToast("保存常规设置失败: " + err.message, "error");
    }
}

document.addEventListener("DOMContentLoaded", () => {
    loadChannels(); // 先获取渠道拉取下拉条
    loadData().catch(err => showToast("初始化失败: " + err.message, "error"));

    loadPollingStats().catch(err => {
        document.getElementById('polling-overview').textContent = '轮询状态加载失败';
        document.getElementById('polling-stats-body').innerHTML = `<tr><td colspan="7" class="py-6 text-center text-red-400">${err.message}</td></tr>`;
    });
    pollingStatsTimer = setInterval(() => {
        loadPollingStats().catch(() => {});
    }, 10000);
});

window.addEventListener('beforeunload', () => {
    if (pollingStatsTimer) {
        clearInterval(pollingStatsTimer);
        pollingStatsTimer = null;
    }
});
</script>
{{ end }}
