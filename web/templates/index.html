{{ define "head" }}
<style>
.stat-card {
    transition: all 0.3s ease;
}
.stat-card:hover {
    transform: translateY(-4px);
}
</style>
{{ end }}

{{ define "content" }}
<div class="mb-8">
    <h2 class="text-2xl font-bold text-gray-800">仪表盘</h2>
    <p class="text-gray-500 mt-1">欢迎回来，查看今日运营数据</p>
</div>

<!-- 统计卡片 -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="stat-card bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">今日评论</p>
                <p class="text-3xl font-bold text-gray-800 mt-2">128</p>
                <p class="text-green-500 text-sm mt-2">
                    <i class="ri-arrow-up-line"></i> 12.5%
                </p>
            </div>
            <div class="w-14 h-14 rounded-2xl gradient-amber flex items-center justify-center">
                <i class="ri-chat-3-line text-white text-2xl"></i>
            </div>
        </div>
    </div>
    
    <div class="stat-card bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">今日私信</p>
                <p class="text-3xl font-bold text-gray-800 mt-2">36</p>
                <p class="text-green-500 text-sm mt-2">
                    <i class="ri-arrow-up-line"></i> 8.3%
                </p>
            </div>
            <div class="w-14 h-14 rounded-2xl gradient-pink flex items-center justify-center">
                <i class="ri-mail-line text-white text-2xl"></i>
            </div>
        </div>
    </div>
    
    <div class="stat-card bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">今日互动</p>
                <p class="text-3xl font-bold text-gray-800 mt-2">256</p>
                <p class="text-green-500 text-sm mt-2">
                    <i class="ri-arrow-up-line"></i> 15.2%
                </p>
            </div>
            <div class="w-14 h-14 rounded-2xl gradient-teal flex items-center justify-center">
                <i class="ri-thumb-up-line text-white text-2xl"></i>
            </div>
        </div>
    </div>
    
    <div class="stat-card bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">AI回复</p>
                <p class="text-3xl font-bold text-gray-800 mt-2">89</p>
                <p class="text-gray-500 text-sm mt-2">
                    <i class="ri-robot-line"></i> 自动处理
                </p>
            </div>
            <div class="w-14 h-14 rounded-2xl gradient-bg flex items-center justify-center">
                <i class="ri-robot-line text-white text-2xl"></i>
            </div>
        </div>
    </div>
</div>

<!-- 快捷操作 -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h3 class="font-semibold text-gray-800 mb-4">快捷操作</h3>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="syncComments()" class="flex items-center justify-center space-x-2 bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-xl p-4 transition">
                <i class="ri-refresh-line"></i>
                <span>同步评论</span>
            </button>
            <button onclick="syncMessages()" class="flex items-center justify-center space-x-2 bg-pink-50 hover:bg-pink-100 text-pink-600 rounded-xl p-4 transition">
                <i class="ri-refresh-line"></i>
                <span>同步私信</span>
            </button>
            <button onclick="batchAIReply()" class="flex items-center justify-center space-x-2 bg-purple-50 hover:bg-purple-100 text-purple-600 rounded-xl p-4 transition">
                <i class="ri-robot-line"></i>
                <span>批量AI回复</span>
            </button>
            <button onclick="interactFans()" class="flex items-center justify-center space-x-2 bg-teal-50 hover:bg-teal-100 text-teal-600 rounded-xl p-4 transition">
                <i class="ri-heart-line"></i>
                <span>互动粉丝</span>
            </button>
        </div>
    </div>
    
    <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h3 class="font-semibold text-gray-800 mb-4">AI模型状态</h3>
        <div id="llm-status" class="space-y-3">
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                <div class="flex items-center space-x-3">
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="text-gray-600">DeepSeek</span>
                </div>
                <span class="text-green-500 text-sm">已连接</span>
            </div>
        </div>
        <button onclick="testLLM()" class="mt-4 w-full bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl p-3 transition">
            测试AI连接
        </button>
    </div>
</div>

<!-- 最近评论 -->
<div class="bg-white rounded-2xl p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-gray-800">最近评论</h3>
        <a href="/comments" class="text-amber-500 hover:text-amber-600 text-sm">查看全部</a>
    </div>
    <div id="recent-comments" class="space-y-4">
        <div class="flex items-start space-x-4 p-4 bg-gray-50 rounded-xl">
            <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
                <i class="ri-user-line text-amber-600"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center justify-between">
                    <span class="font-medium text-gray-800">用户名</span>
                    <span class="text-xs text-gray-400">2分钟前</span>
                </div>
                <p class="text-gray-600 mt-1">这是评论内容示例...</p>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
async function syncComments() {
    showToast('正在同步评论...', 'info');
    try {
        const response = await fetch('/api/comments/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ video_bvid: '', page: 1, page_size: 50 })
        });
        const data = await response.json();
        showToast(`同步完成，新增 ${data.count} 条评论`, 'success');
    } catch (error) {
        showToast('同步失败: ' + error.message, 'error');
    }
}

async function syncMessages() {
    showToast('正在同步私信...', 'info');
    try {
        const response = await fetch('/api/messages/sync', { method: 'POST' });
        const data = await response.json();
        showToast(`同步完成，新增 ${data.count} 条私信`, 'success');
    } catch (error) {
        showToast('同步失败: ' + error.message, 'error');
    }
}

async function batchAIReply() {
    showToast('正在批量AI回复...', 'info');
    try {
        const response = await fetch('/api/comments/batch-ai-reply?limit=10', { method: 'POST' });
        const data = await response.json();
        showToast(`批量回复完成，处理 ${data.count} 条`, 'success');
    } catch (error) {
        showToast('批量回复失败: ' + error.message, 'error');
    }
}

async function interactFans() {
    showToast('正在互动粉丝视频...', 'info');
    try {
        const response = await fetch('/api/fans/interact?action=like&limit=10', { method: 'POST' });
        const data = await response.json();
        showToast(`互动完成，处理 ${data.count} 个视频`, 'success');
    } catch (error) {
        showToast('互动失败: ' + error.message, 'error');
    }
}

async function testLLM() {
    showToast('正在测试AI连接...', 'info');
    try {
        const response = await fetch('/api/llm/test/default');
        const data = await response.json();
        if (data.success) {
            showToast('AI连接测试成功', 'success');
        } else {
            showToast('AI连接测试失败: ' + data.message, 'error');
        }
    } catch (error) {
        showToast('测试失败: ' + error.message, 'error');
    }
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${
        type === 'success' ? 'bg-green-500' : 
        type === 'error' ? 'bg-red-500' : 'bg-blue-500'
    }`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
</script>
{{ end }}
