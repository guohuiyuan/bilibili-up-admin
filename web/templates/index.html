<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
    <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-gray-800">最近评论</h3>
        <a href="/admin/comments" class="text-pink-500 hover:text-pink-600 text-sm transition font-medium">查看全部 <i class="ri-arrow-right-s-line"></i></a>
    </div>
    <div id="recent-comments" class="space-y-4">
        <div class="flex items-start space-x-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
            <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center flex-shrink-0">
                <i class="ri-user-smile-line text-pink-500"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center justify-between">
                    <span class="font-medium text-gray-800">系统提示</span>
                    <span class="text-xs text-gray-400">刚刚</span>
                </div>
                <p class="text-gray-600 mt-1 text-sm">后台轮询已启用，正在等待最新评论数据。</p>
            </div>
        </div>
    </div>

{{ define "scripts" }}
<script>
// 动态兼容前缀
function getApiPrefix() {
    return window.location.pathname.startsWith('/admin') ? '/admin' : '';
}

function safeNum(val) {
    const n = Number(val || 0);
    return Number.isFinite(n) ? n : 0;
}

async function loadDashboardStats() {
    const prefix = getApiPrefix();
    const [comments, messages, interactions, llmStats] = await Promise.all([
        api(`${prefix}/api/comments?page=1&page_size=1`),
        api(`${prefix}/api/messages?page=1&page_size=1`),
        api(`${prefix}/api/interactions/stats?days=30`),
        api(`${prefix}/api/llm/stats`),
    ]);

    const interactionTotal = safeNum(interactions.like) + safeNum(interactions.coin) + safeNum(interactions.favorite);
    document.getElementById('stat-comments').textContent = formatNumber(comments.total || 0);
    document.getElementById('stat-messages').textContent = formatNumber(messages.total || 0);
    document.getElementById('stat-interactions').textContent = formatNumber(interactionTotal);
    document.getElementById('stat-ai-replies').textContent = formatNumber(llmStats.success_count || 0);
}

async function loadRecentComments() {
    const prefix = getApiPrefix();
    const data = await api(`${prefix}/api/comments?page=1&page_size=5`);
    const comments = data.comments || [];
    const container = document.getElementById('recent-comments');
    if (!comments.length) {
        container.innerHTML = `
        <div class="flex items-start space-x-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
            <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center flex-shrink-0">
                <i class="ri-information-line text-pink-500"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center justify-between">
                    <span class="font-medium text-gray-800">系统提示</span>
                    <span class="text-xs text-gray-400">刚刚</span>
                </div>
                <p class="text-gray-600 mt-1 text-sm">后台轮询已启用，暂无最新评论。</p>
            </div>
        </div>`;
        return;
    }

    container.innerHTML = comments.map(item => `
    <div class="flex items-start space-x-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
        <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center flex-shrink-0">
            <i class="ri-user-smile-line text-pink-500"></i>
        </div>
        <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between">
                <span class="font-medium text-gray-800 truncate">${item.author_name || '用户'}</span>
                <span class="text-xs text-gray-400">${formatTime(item.comment_time) || '-'}</span>
            </div>
            <p class="text-gray-600 mt-1 text-sm truncate">${item.content || ''}</p>
        </div>
    </div>`).join('');
}

// --- 真正的模型状态核心逻辑 ---

// 加载模型真实状态
async function loadLLMStatus() {
    const container = document.getElementById('llm-status');
    container.innerHTML = '<div class="text-center text-pink-400 py-8"><i class="ri-loader-4-line animate-spin text-3xl"></i><p class="text-sm mt-2">获取最新状态...</p></div>';
    
    try {
        const prefix = getApiPrefix();
        // 1. 获取数据库里所有的模型配置
        const providersData = await api(`${prefix}/api/settings/llm/providers`);
        // 2. 获取当前实际生效的（运行时管理器中成功载入的）
        const runtimeInfo = await api(`${prefix}/api/llm/providers`);
        
        const defaultProv = runtimeInfo.default_provider || "";
        const activeProvs = runtimeInfo.providers || [];

        const entries = Object.entries(providersData || {});
        
        if (entries.length === 0) {
            container.innerHTML = `
                <div class="text-center text-gray-400 text-sm py-8 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <i class="ri-robot-line text-3xl mb-2"></i>
                    <p>暂无配置的大模型</p>
                    <a href="${prefix}/settings" class="text-pink-500 hover:underline mt-2 inline-block font-medium">前往设置添加配置</a>
                </div>`;
            return;
        }

        // 渲染列表
        container.innerHTML = entries.map(([name, config]) => {
            const isEnabled = config.enabled;
            const isActive = activeProvs.includes(name); // 存在于运行时管理器
            
            // 状态指示器诊断
            let statusColor = 'bg-gray-300';
            let statusText = '未启用';
            if (isActive) {
                statusColor = 'bg-green-500';
                statusText = '已就绪';
            } else if (isEnabled) {
                statusColor = 'bg-amber-500';
                statusText = '配置异常'; // 勾选了启用，但没有被成功加载进内存(可能缺API Key)
            }

            const isDefault = name === defaultProv;

            return `
            <div class="flex items-center justify-between p-3.5 bg-white rounded-xl border border-gray-100 shadow-sm hover:border-pink-200 transition group">
                <div class="flex flex-col">
                    <div class="flex items-center space-x-2">
                        <div class="w-2.5 h-2.5 rounded-full ${statusColor} shadow-sm" id="status-dot-${name}" title="${statusText}"></div>
                        <span class="text-gray-800 font-bold text-sm">${name}</span>
                        ${isDefault ? '<span class="text-[10px] bg-pink-100 text-pink-600 px-1.5 py-0.5 rounded font-bold">全局默认</span>' : ''}
                    </div>
                    <span class="text-[11px] text-gray-400 mt-1 ml-4 flex items-center">
                        <i class="ri-cpu-line mr-1"></i>${config.provider} ${config.model ? `(${config.model})` : ''}
                    </span>
                </div>
                ${isActive ? `
                <button onclick="testLLM('${name}')" class="text-blue-500 hover:text-white hover:bg-blue-500 text-xs flex items-center transition bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-lg shadow-sm">
                    <i class="ri-pulse-line mr-1" id="test-icon-${name}"></i> 连通性
                </button>
                ` : `
                <span class="text-xs ${isEnabled ? 'text-amber-500 bg-amber-50' : 'text-gray-400 bg-gray-50'} px-2 py-1 rounded-md border ${isEnabled ? 'border-amber-100' : 'border-gray-100'}">${statusText}</span>
                `}
            </div>
            `;
        }).join('');
    } catch (err) {
        container.innerHTML = `<div class="text-center text-red-400 text-sm py-4"><i class="ri-error-warning-line text-2xl mb-1"></i><p>状态加载失败</p></div>`;
        console.error("Load LLM Status Error:", err);
    }
}

// 单独测试某个模型
async function testLLM(providerName) {
    const icon = document.getElementById(`test-icon-${providerName}`);
    const dot = document.getElementById(`status-dot-${providerName}`);
    if (icon) icon.classList.add('animate-spin');
    
    showToast(`正在发送测试请求给 [${providerName}]...`, 'info');
    try {
        const prefix = getApiPrefix();
        const response = await fetch(`${prefix}/api/llm/test/${encodeURIComponent(providerName)}`);
        const data = await response.json();
        
        if (response.ok && data.success !== false) {
            showToast(`[${providerName}] 响应成功!`, 'success');
            if (dot) { dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm'; }
        } else {
            throw new Error(data.message || data.error || '请求超时或配置错误');
        }
    } catch (error) {
        showToast(`[${providerName}] 测试失败: ` + error.message, 'error');
        if (dot) { dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm'; }
    } finally {
        if (icon) icon.classList.remove('animate-spin');
    }
}

// 批量测试所有激活的模型
async function testAllLLM() {
    const prefix = getApiPrefix();
    try {
        const runtimeInfo = await api(`${prefix}/api/llm/providers`);
        const activeProvs = runtimeInfo.providers || [];
        if (activeProvs.length === 0) {
            showToast("没有检测到处于已就绪状态的模型", "warning");
            return;
        }
        
        showToast(`开始批量测试 ${activeProvs.length} 个就绪模型...`, "info");
        for (const p of activeProvs) {
            try {
                await testLLM(p);
            } catch(e) {}
            // 延时 1000 毫秒，避免并发超速触发 API 限制
            await new Promise(r => setTimeout(r, 1000));
        }
    } catch (err) {
        showToast("读取运行状态失败: " + err.message, "error");
    }
}

// 页面加载完成后，自动拉取真实状态
document.addEventListener('DOMContentLoaded', () => {
    const refreshAll = async () => {
        await Promise.allSettled([loadDashboardStats(), loadRecentComments(), loadLLMStatus()]);
    };
    refreshAll();
    setInterval(refreshAll, 60 * 1000);
});
</script>
{{ end }}
